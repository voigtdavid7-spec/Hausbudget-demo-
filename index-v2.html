<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f3f4f6">
  <title>HausBudget Demo</title>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111827;background:#f3f4f6}
    *{box-sizing:border-box}
    body{margin:0;padding:env(safe-area-inset-top) 0 calc(76px + env(safe-area-inset-bottom))}
    header{position:sticky;top:0;z-index:5;background:rgba(243,244,246,.94);backdrop-filter:blur(14px);border-bottom:1px solid #d1d5db;padding:16px}
    h1{margin:0;font-size:25px}.subtitle{color:#6b7280;font-size:13px;margin-top:3px}
    main{max-width:760px;margin:auto;padding:14px}
    .card{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 1px 5px rgba(0,0,0,.08)}
    .hero{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff}
    .hero .muted{color:rgba(255,255,255,.8)}.hero-amount{font-size:34px;font-weight:800;margin:5px 0 12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .metric{background:#fff;border-radius:16px;padding:14px;min-width:0}
    .metric strong{display:block;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .muted{color:#6b7280;font-size:13px}
    .progress{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden}.bar{height:100%;background:#22c55e}
    .row{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid #eee}.row:last-child{border-bottom:0}
    .grow{flex:1;min-width:0}.amount{font-weight:750}.over{color:#dc2626}.ok{color:#15803d}.warn{color:#d97706}
    .pill{display:inline-block;font-size:11px;padding:4px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;margin-top:5px}
    button{border:0;border-radius:12px;padding:12px 14px;font-weight:650;background:#2563eb;color:#fff;font-size:15px}
    button.secondary{background:#e5e7eb;color:#111827}button.danger{background:#dc2626}
    .actions{display:flex;gap:10px;margin:12px 0}.actions>*{flex:1}
    label{display:block;font-size:13px;color:#6b7280;margin:10px 0 5px}
    input,select,textarea{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;background:#fff;font-size:16px}
    textarea{min-height:76px}
    .tabs{position:fixed;bottom:0;left:0;right:0;z-index:8;background:#fff;border-top:1px solid #ddd;display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}
    .tabs button{background:transparent;color:#6b7280;border-radius:0;padding:11px 4px;font-size:12px}.tabs button.active{color:#2563eb}
    .traffic{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
    .light{border-radius:14px;padding:12px;text-align:center;background:#f3f4f6}
    .light.active.green{background:#dcfce7;color:#166534}.light.active.yellow{background:#fef3c7;color:#92400e}.light.active.red{background:#fee2e2;color:#991b1b}
    .big-progress{font-size:30px;font-weight:800;margin:6px 0}.doc-meta{font-size:12px;color:#6b7280;margin-top:3px}.empty{padding:18px;text-align:center;color:#6b7280}
    .hidden{display:none}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;z-index:20}
    .sheet{background:#f9fafb;width:100%;max-height:92vh;overflow:auto;border-radius:22px 22px 0 0;padding:18px}
    @media(min-width:700px){.modal{align-items:center;justify-content:center}.sheet{max-width:560px;border-radius:22px}}
  </style>
</head>
<body>
<header><h1>HausBudget</h1><div class="subtitle" id="projectTitle"></div></header>

<main>
  <section id="dashboard"></section>
  <section id="categories" class="hidden"></section>
  <section id="expenses" class="hidden"></section>
  <section id="documents" class="hidden"></section><section id="settings" class="hidden"></section>
</main>

<nav class="tabs">
  <button data-tab="dashboard" class="active">Übersicht</button>
  <button data-tab="categories">Posten</button>
  <button data-tab="expenses">Ausgaben</button>
  <button data-tab="documents">Dokumente</button><button data-tab="settings">Projekt</button>
</nav>

<div id="modalRoot"></div>

<script>
const STORAGE_KEY="hausbudget_demo_v1";
const sampleData=()=>({
  projectName:"Unser Hausbau",
  totalBudget:486000,
  reserveTarget:20000,buildProgress:35,
  categories:[
    {id:"grund",name:"Grundstück",planned:77400,status:"Abgeschlossen",note:""},
    {id:"arch",name:"Architekt",planned:6000,status:"Abgeschlossen",note:""},
    {id:"boden",name:"Bodenplatte",planned:23335,status:"Beauftragt",note:""},
    {id:"haus",name:"Haus",planned:330245,status:"In Arbeit",note:""},
    {id:"kueche",name:"Küche",planned:18000,status:"In Planung",note:""},
    {id:"aussen",name:"Außenanlagen",planned:25000,status:"Nicht begonnen",note:""}
  ],
  expenses:[
    {id:crypto.randomUUID(),categoryId:"grund",title:"Kaufpreis Grundstück",amount:77400,date:"2026-02-01",company:"Privat",paid:true,note:""},
    {id:crypto.randomUUID(),categoryId:"arch",title:"Architektenleistungen",amount:6850,date:"2026-04-01",company:"Architekturbüro",paid:true,note:""},
    {id:crypto.randomUUID(),categoryId:"boden",title:"Abschlagszahlung",amount:8000,date:"2026-06-20",company:"Bauunternehmen",paid:true,note:""},
    {id:crypto.randomUUID(),categoryId:"haus",title:"1. Hausrate",amount:45000,date:"2026-07-01",company:"Bien-Zenker",paid:false,note:""}
  ]
});

let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null")||sampleData();if(typeof data.buildProgress!=="number")data.buildProgress=35;

const euro=n=>new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(Number(n)||0);
const actual=id=>data.expenses.filter(x=>x.categoryId===id).reduce((s,x)=>s+Number(x.amount),0);
const totalActual=()=>data.expenses.reduce((s,x)=>s+Number(x.amount),0);
const totalPlanned=()=>data.categories.reduce((s,x)=>s+Number(x.planned),0);
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));

function persist(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));render()}

function render(){
  projectTitle.textContent=data.projectName;
  renderDashboard();renderCategories();renderExpenses();renderDocuments();renderSettings();
}

function renderDashboard(){
  const used=totalActual(), pct=Math.min(100,Math.round(used/Math.max(1,data.totalBudget)*100));
  const planned=totalPlanned(), ratio=planned/Math.max(1,data.totalBudget);
  const light=ratio>1?"red":ratio>=0.95?"yellow":"green";
  const over=data.categories.filter(c=>actual(c.id)>c.planned);
  dashboard.innerHTML=`
    <div class="card hero"><div class="muted">Gesamtbudget</div><div class="hero-amount">${euro(data.totalBudget)}</div>
      <div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="muted" style="margin-top:8px">${pct}% ausgegeben · geplant ${euro(planned)}</div></div>
    <div class="grid">
      <div class="metric"><strong>${euro(used)}</strong><span class="muted">Ausgegeben</span></div>
      <div class="metric"><strong>${euro(data.expenses.filter(x=>!x.paid).reduce((s,x)=>s+Number(x.amount),0))}</strong><span class="muted">Offen</span></div>
      <div class="metric"><strong>${euro(data.totalBudget-used)}</strong><span class="muted">Restbudget</span></div>
      <div class="metric"><strong>${euro(data.totalBudget-planned)}</strong><span class="muted">Plan-Puffer</span></div>
    </div>
    <div class="card"><strong>Budgetampel</strong><div class="traffic">
      <div class="light green ${light==="green"?"active":""}">🟢<br><span class="muted">im Plan</span></div>
      <div class="light yellow ${light==="yellow"?"active":""}">🟡<br><span class="muted">knapp</span></div>
      <div class="light red ${light==="red"?"active":""}">🔴<br><span class="muted">über Plan</span></div>
    </div><div class="muted" style="margin-top:10px">${light==="green"?"Die geplanten Kosten liegen unter eurem Gesamtbudget.":light==="yellow"?"Weniger als 5 % Puffer verbleiben.":"Die geplanten Kosten überschreiten das Gesamtbudget."}</div></div>
    <div class="card"><strong>Baufortschritt</strong><div class="big-progress">${Math.round(data.buildProgress)} %</div>
      <div class="progress"><div class="bar" style="width:${Math.min(100,Math.max(0,data.buildProgress))}%;background:#2563eb"></div></div>
      <div class="muted" style="margin-top:8px">Im Bereich „Projekt“ einstellbar.</div></div>
    <div class="card"><strong>Hinweise</strong><div style="margin-top:10px">${over.length?over.map(c=>`<div class="over">⚠ ${esc(c.name)}: ${euro(actual(c.id)-c.planned)} über Budget</div>`).join(""):`<div class="ok">✓ Alle Posten liegen aktuell im Plan.</div>`}</div></div>`;
}
function renderCategories(){
  categories.innerHTML=`
    <div class="actions"><button onclick="openCategory()">Posten hinzufügen</button></div>
    <div class="card">
      ${data.categories.map(c=>{
        const a=actual(c.id), p=Math.min(100,Math.round(a/Math.max(1,c.planned)*100));
        return `<div class="row" onclick="openCategory('${c.id}')">
          <div class="grow">
            <strong>${esc(c.name)}</strong>
            <div class="muted">${esc(c.status)}</div>
            <div class="progress" style="margin-top:7px"><div class="bar" style="width:${p}%;background:${a>c.planned?"#dc2626":"#2563eb"}"></div></div>
            <div class="muted" style="margin-top:5px">Ist ${euro(a)} · Plan ${euro(c.planned)}</div>
          </div><span>›</span>
        </div>`;
      }).join("")}
    </div>`;
}

function renderExpenses(){
  const sorted=[...data.expenses].sort((a,b)=>b.date.localeCompare(a.date));
  expenses.innerHTML=`
    <div class="actions"><button onclick="openExpense()">Ausgabe hinzufügen</button></div>
    <div class="card">
      ${sorted.length?sorted.map(x=>`<div class="row" onclick="openExpense('${x.id}')">
        <div class="grow">
          <strong>${esc(x.title)}</strong>
          <div class="muted">${esc(data.categories.find(c=>c.id===x.categoryId)?.name||"Unbekannt")} · ${new Date(x.date+"T12:00:00").toLocaleDateString("de-DE")}</div>
          <span class="pill">${x.paid?"Bezahlt":"Offen"}</span>
        </div>
        <div class="amount">${euro(x.amount)}</div>
      </div>`).join(""):`<div class="muted">Noch keine Ausgaben erfasst.</div>`}
    </div>`;
}

const DOC_DB="hausbudget_documents_v1", DOC_STORE="documents";
function openDocDB(){return new Promise((resolve,reject)=>{const r=indexedDB.open(DOC_DB,1);r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains(DOC_STORE))r.result.createObjectStore(DOC_STORE,{keyPath:"id"})};r.onsuccess=()=>resolve(r.result);r.onerror=()=>reject(r.error)})}
async function getDocs(){const db=await openDocDB();return new Promise((resolve,reject)=>{const r=db.transaction(DOC_STORE,"readonly").objectStore(DOC_STORE).getAll();r.onsuccess=()=>resolve(r.result.sort((a,b)=>b.createdAt.localeCompare(a.createdAt)));r.onerror=()=>reject(r.error)})}
async function putDoc(file,category){const db=await openDocDB();return new Promise((resolve,reject)=>{const tx=db.transaction(DOC_STORE,"readwrite");tx.objectStore(DOC_STORE).put({id:crypto.randomUUID(),name:file.name,type:file.type,size:file.size,category,createdAt:new Date().toISOString(),blob:file});tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)})}
async function renderDocuments(){
  documents.innerHTML=`<div class="card"><strong>Dokumente</strong><div class="muted" style="margin-top:6px">PDFs und Fotos werden lokal auf diesem Gerät gespeichert.</div>
  <label>Kategorie</label><select id="docCategory"><option>Verträge</option><option>Rechnungen</option><option>Grundrisse</option><option>Gutachten</option><option>Fotos</option><option>Sonstiges</option></select>
  <label>Datei auswählen</label><input id="docFile" type="file" accept=".pdf,image/*,.doc,.docx,.xls,.xlsx"><div class="actions"><button onclick="uploadDocument()">Dokument speichern</button></div></div>
  <div class="card" id="documentList"><div class="empty">Dokumente werden geladen …</div></div>`;
  try{const ds=await getDocs();documentList.innerHTML=ds.length?ds.map(d=>`<div class="row"><div class="grow"><strong>${esc(d.name)}</strong><div class="doc-meta">${esc(d.category)} · ${(d.size/1024/1024).toFixed(2)} MB · ${new Date(d.createdAt).toLocaleDateString("de-DE")}</div><div class="actions"><button class="secondary" onclick="openDocument('${d.id}')">Öffnen</button><button class="danger" onclick="removeDocument('${d.id}')">Löschen</button></div></div></div>`).join(""):`<div class="empty">Noch keine Dokumente gespeichert.</div>`}catch(e){documentList.innerHTML=`<div class="over">Dokumentenspeicher konnte nicht geöffnet werden.</div>`}
}
async function uploadDocument(){const f=docFile.files[0];if(!f)return alert("Bitte zuerst eine Datei auswählen.");try{await putDoc(f,docCategory.value);docFile.value="";await renderDocuments()}catch(e){alert("Datei konnte nicht gespeichert werden.")}}
async function openDocument(id){const d=(await getDocs()).find(x=>x.id===id);if(!d)return;const u=URL.createObjectURL(d.blob);window.open(u,"_blank");setTimeout(()=>URL.revokeObjectURL(u),60000)}
async function removeDocument(id){if(!confirm("Dokument wirklich löschen?"))return;const db=await openDocDB();await new Promise((resolve,reject)=>{const tx=db.transaction(DOC_STORE,"readwrite");tx.objectStore(DOC_STORE).delete(id);tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)});await renderDocuments()}

function renderSettings(){
  settings.innerHTML=`
    <div class="card">
      <label>Projektname</label><input id="sName" value="${esc(data.projectName)}">
      <label>Gesamtbudget</label><input id="sBudget" type="number" inputmode="decimal" value="${data.totalBudget}">
      <label>Mindestpuffer</label><input id="sReserve" type="number" inputmode="decimal" value="${data.reserveTarget}"><label>Baufortschritt in Prozent</label><input id="sProgress" type="number" min="0" max="100" inputmode="numeric" value="${data.buildProgress}">
      <div class="actions"><button onclick="saveSettings()">Speichern</button></div>
    </div>
    <div class="card">
      <div class="muted" style="margin-bottom:12px">Budgetdaten werden im Browser gespeichert. Dokumente liegen lokal in IndexedDB und sind nicht automatisch synchronisiert.</div><button class="secondary" onclick="exportCSV()">CSV exportieren</button>
      <div style="height:10px"></div>
      <button class="danger" onclick="resetData()">Beispieldaten wiederherstellen</button>
    </div>`;
}

function switchTab(id){
  document.querySelectorAll("main section").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===id));
}
document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));

function modal(html){modalRoot.innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="sheet">${html}</div></div>`}
function closeModal(){modalRoot.innerHTML=""}

function openCategory(id){
  const c=data.categories.find(x=>x.id===id)||{id:"",name:"",planned:0,status:"Nicht begonnen",note:""};
  modal(`<h2>${id?"Posten bearbeiten":"Neuer Posten"}</h2>
    <label>Bezeichnung</label><input id="cName" value="${esc(c.name)}">
    <label>Geplantes Budget</label><input id="cPlanned" type="number" inputmode="decimal" value="${c.planned}">
    <label>Status</label><select id="cStatus">
      ${["Nicht begonnen","In Planung","Beauftragt","In Arbeit","Abgeschlossen"].map(s=>`<option ${s===c.status?"selected":""}>${s}</option>`).join("")}
    </select>
    <label>Notiz</label><textarea id="cNote">${esc(c.note)}</textarea>
    <div class="actions"><button class="secondary" onclick="closeModal()">Abbrechen</button><button onclick="saveCategory('${id||""}')">Speichern</button></div>
    ${id?`<div class="actions"><button class="danger" onclick="deleteCategory('${id}')">Posten löschen</button></div>`:""}`);
}
function saveCategory(id){
  const obj={id:id||crypto.randomUUID(),name:cName.value.trim(),planned:Number(cPlanned.value),status:cStatus.value,note:cNote.value};
  if(!obj.name)return alert("Bitte Bezeichnung eingeben.");
  const i=data.categories.findIndex(x=>x.id===id);
  if(i>=0)data.categories[i]=obj; else data.categories.push(obj);
  closeModal();persist();
}
function deleteCategory(id){
  if(confirm("Posten und zugehörige Ausgaben löschen?")){
    data.categories=data.categories.filter(x=>x.id!==id);
    data.expenses=data.expenses.filter(x=>x.categoryId!==id);
    closeModal();persist();
  }
}

function openExpense(id){
  if(!data.categories.length)return alert("Bitte zuerst einen Budgetposten anlegen.");
  const x=data.expenses.find(v=>v.id===id)||{id:"",categoryId:data.categories[0].id,title:"",amount:0,date:new Date().toISOString().slice(0,10),company:"",paid:true,note:""};
  modal(`<h2>${id?"Ausgabe bearbeiten":"Neue Ausgabe"}</h2>
    <label>Posten</label><select id="eCat">${data.categories.map(c=>`<option value="${c.id}" ${c.id===x.categoryId?"selected":""}>${esc(c.name)}</option>`).join("")}</select>
    <label>Bezeichnung</label><input id="eTitle" value="${esc(x.title)}">
    <label>Betrag</label><input id="eAmount" type="number" inputmode="decimal" value="${x.amount}">
    <label>Datum</label><input id="eDate" type="date" value="${x.date}">
    <label>Firma</label><input id="eCompany" value="${esc(x.company)}">
    <label><input id="ePaid" type="checkbox" style="width:auto" ${x.paid?"checked":""}> Bereits bezahlt</label>
    <label>Notiz</label><textarea id="eNote">${esc(x.note)}</textarea>
    <div class="actions"><button class="secondary" onclick="closeModal()">Abbrechen</button><button onclick="saveExpense('${id||""}')">Speichern</button></div>
    ${id?`<div class="actions"><button class="danger" onclick="deleteExpense('${id}')">Ausgabe löschen</button></div>`:""}`);
}
function saveExpense(id){
  const obj={id:id||crypto.randomUUID(),categoryId:eCat.value,title:eTitle.value.trim(),amount:Number(eAmount.value),date:eDate.value,company:eCompany.value,paid:ePaid.checked,note:eNote.value};
  if(!obj.title||obj.amount<=0)return alert("Bitte Bezeichnung und gültigen Betrag eingeben.");
  const i=data.expenses.findIndex(x=>x.id===id);
  if(i>=0)data.expenses[i]=obj; else data.expenses.push(obj);
  closeModal();persist();
}
function deleteExpense(id){
  if(confirm("Ausgabe löschen?")){
    data.expenses=data.expenses.filter(x=>x.id!==id);
    closeModal();persist();
  }
}

function saveSettings(){
  data.projectName=sName.value.trim()||"HausBudget";
  data.totalBudget=Number(sBudget.value);
  data.reserveTarget=Number(sReserve.value);data.buildProgress=Math.min(100,Math.max(0,Number(sProgress.value)||0));persist();
}
function resetData(){if(confirm("Alle Daten durch Beispieldaten ersetzen?")){data=sampleData();persist()}}
function exportCSV(){
  let rows=[["Datum","Kategorie","Bezeichnung","Firma","Betrag","Bezahlt","Notiz"]];
  data.expenses.forEach(x=>rows.push([x.date,data.categories.find(c=>c.id===x.categoryId)?.name||"",x.title,x.company,x.amount,x.paid?"Ja":"Nein",x.note]));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(";")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="HausBudget.csv";a.click();
}
render();
</script>
</body>
</html>
