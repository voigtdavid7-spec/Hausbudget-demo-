const additionalActual=id=>data.expenses.filter(x=>x.categoryId===id&&x.isAdditional).reduce((s,x)=>s+Number(x.amount),0);

const allocatedPaid=x=>(Number(x.equityPaid)||0)+(Number(x.loanPaid)||0);
const legacyUnassignedPaid=x=>x.paid&&allocatedPaid(x)===0?Number(x.amount)||0:0;
const paidAmount=x=>Math.min(Number(x.amount)||0,allocatedPaid(x)+legacyUnassignedPaid(x));
const openAmount=x=>Math.max(0,(Number(x.amount)||0)-paidAmount(x));
const paymentStatus=x=>{
  const amount=Number(x.amount)||0, allocated=allocatedPaid(x);
  if(x.paid&&allocated===0)return {key:"unassigned",label:"Bezahlt · Quelle offen"};
  if(allocated<=0)return {key:"open",label:"Offen"};
  if(allocated<amount)return {key:"partial",label:"Teilweise bezahlt"};
  return {key:"paid",label:"Bezahlt"};
};
const totalEquityUsed=()=>data.expenses.reduce((s,x)=>s+(Number(x.equityPaid)||0),0);
const totalLoanUsed=()=>data.expenses.reduce((s,x)=>s+(Number(x.loanPaid)||0),0);
const totalOpen=()=>data.expenses.reduce((s,x)=>s+openAmount(x),0);
const categoryForecast=c=>Math.max(effectivePlanned(c),plannedActual(c.id))+additionalActual(c.id);
const forecastTotal=()=>data.categories.reduce((sum,c)=>sum+categoryForecast(c),0);
const freeCapital=()=>Number(data.totalBudget||0)-forecastTotal();
const plannedBufferTotal=()=>Math.max(0,(Number(data.financingBuffer)||0)+(Number(data.miscReserve)||0));
const additionalHeadroom=()=>Math.max(0,freeCapital()-plannedBufferTotal());
const remainingPlannedBuffer=()=>Math.max(0,Math.min(plannedBufferTotal(),freeCapital()));

const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));


function helpButton(topic){
  return `<button type="button" class="help-button" onclick="event.stopPropagation();openHelp('${topic}')" aria-label="Hilfe">i</button>`;

function openHelp(topic){
  const h=HELP_TOPICS[topic];
  if(!h)return;
  modal(`<div class="help-sheet">
    <div class="section-title"><h2>${esc(h.title)}</h2><button class="secondary small-button" onclick="closeModal()">Schließen</button></div>
    <p>${esc(h.text)}</p>
    ${h.formula?`<h3>Berechnung / Logik</h3><div class="formula">${esc(h.formula)}</div>`:""}
    ${h.example?`<div class="help-example"><strong>Beispiel</strong><p style="margin:5px 0 0">${esc(h.example)}</p></div>`:""}
  </div>`);
}

function openHelpCenter(searchText=""){
  const q=normalizeSearch(searchText);
  const groups={};
  Object.entries(HELP_TOPICS).forEach(([key,h])=>{
    const searchable=normalizeSearch([h.title,h.category,h.text,h.formula,h.example].join(" "));
    if(q&&!searchable.includes(q))return;
    if(!groups[h.category])groups[h.category]=[];
    groups[h.category].push({key,...h});
  });

  const content=Object.keys(groups).sort().map(category=>`
    <div class="help-category">${esc(category)}</div>
    ${groups[category].map(h=>`<div class="help-link" onclick="openHelp('${h.key}')">
      <div><strong>${esc(h.title)}</strong><div class="muted">${esc(h.text.slice(0,95))}${h.text.length>95?"…":""}</div></div><span>›</span>
    </div>`).join("")}
  `).join("");

  modal(`<div class="help-sheet">
    <div class="section-title"><h2>HausBudget-Hilfe</h2><button class="secondary small-button" onclick="closeModal()">Schließen</button></div>
    <input class="help-search" id="helpSearchInput" type="search" placeholder="Hilfe durchsuchen" value="${esc(searchText)}" oninput="refreshHelpCenter(this.value)">
    <div id="helpCenterResults">${content||`<div class="empty">Keine Erklärung gefunden.</div>`}</div>
  </div>`);
}

function refreshHelpCenter(value){
  const q=normalizeSearch(value);
  const groups={};
  Object.entries(HELP_TOPICS).forEach(([key,h])=>{
    const searchable=normalizeSearch([h.title,h.category,h.text,h.formula,h.example].join(" "));
    if(q&&!searchable.includes(q))return;
    if(!groups[h.category])groups[h.category]=[];
    groups[h.category].push({key,...h});
  });
  const target=document.getElementById("helpCenterResults");
  if(!target)return;
  target.innerHTML=Object.keys(groups).sort().map(category=>`
    <div class="help-category">${esc(category)}</div>
    ${groups[category].map(h=>`<div class="help-link" onclick="openHelp('${h.key}')">
      <div><strong>${esc(h.title)}</strong><div class="muted">${esc(h.text.slice(0,95))}${h.text.length>95?"…":""}</div></div><span>›</span>
    </div>`).join("")}
  `).join("")||`<div class="empty">Keine Erklärung gefunden.</div>`;
}

const DOC_DB="hausbudget_documents_v1", DOC_STORE="documents";
function openDocDB(){return new Promise((resolve,reject)=>{
  const r=indexedDB.open(DOC_DB,2);
  r.onupgradeneeded=()=>{
    if(!r.result.objectStoreNames.contains(DOC_STORE))r.result.createObjectStore(DOC_STORE,{keyPath:"id"});
    if(!r.result.objectStoreNames.contains(BACKUP_STORE))r.result.createObjectStore(BACKUP_STORE,{keyPath:"id"});
  };
  r.onsuccess=()=>resolve(r.result);
  r.onerror=()=>reject(r.error);
})}
async function getDocs(){const db=await openDocDB();return new Promise((resolve,reject)=>{const r=db.transaction(DOC_STORE,"readonly").objectStore(DOC_STORE).getAll();r.onsuccess=()=>resolve(r.result.sort((a,b)=>b.createdAt.localeCompare(a.createdAt)));r.onerror=()=>reject(r.error)})}
async function putDoc(file,category){const db=await openDocDB();return new Promise((resolve,reject)=>{const tx=db.transaction(DOC_STORE,"readwrite");tx.objectStore(DOC_STORE).put({id:crypto.randomUUID(),name:file.name,type:file.type,size:file.size,category,createdAt:new Date().toISOString(),blob:file});tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)})}

async function uploadDocumentToDropbox(){
  ensureDataShape();

  const file=document.getElementById("docFile")?.files?.[0];
  if(!file)return alert("Bitte zuerst eine Datei auswählen.");

  const category=document.getElementById("docCategory").value;
  const postId=document.getElementById("docPost").value;
  const expenseId=document.getElementById("docExpense").value;
  const id=crypto.randomUUID();

  const path=`/Dokumente/${safeDropboxName(category)}/${id}_${safeName}`;
  const progress=document.getElementById("docUploadProgress");
  const bar=progress?.querySelector("div"),text=document.getElementById("docUploadText");
  if(progress)progress.classList.remove("hidden");if(bar)bar.style.width="20%";if(text)text.textContent="Datei wird zu Dropbox übertragen …";
  try{
    const token=await dbToken();
    if(bar)bar.style.width="45%";
    const response=await fetch("https://content.dropboxapi.com/2/files/upload",{
      method:"POST",
      headers:{
        Authorization:`Bearer ${token}`,
        "Content-Type":"application/octet-stream",
        "Dropbox-API-Arg":JSON.stringify({path,mode:{".tag":"add"},autorename:false,mute:true})
      },
      body:file
    });
    const result=await response.json().catch(()=>({}));
    if(!response.ok)throw Error(result.error_summary||"Upload fehlgeschlagen");
    if(bar)bar.style.width="80%";
    ensureDataShape();
    data.documents.push({
      id,name:file.name,type:file.type||"application/octet-stream",size:file.size,
      category,postId,expenseId,path:result.path_lower||path,rev:result.rev||"",
      createdAt:new Date().toISOString()
    });
    persist();
    if(bar)bar.style.width="100%";if(text)text.textContent="Dokument gespeichert und Metadaten synchronisiert.";
    setTimeout(()=>renderDocuments(),500);
  }catch(error){
    console.error(error);
    if(text)text.textContent="";
    if(progress)progress.classList.add("hidden");
    alert("Dokument konnte nicht gespeichert werden: "+error.message);
  }
}
async function openDropboxDocument(id){
  const doc=(data.documents||[]).find(d=>d.id===id);

  if(!dbTokens())return alert("Bitte Dropbox verbinden.");

    const result=await dbApi("files/get_temporary_link",{path:doc.path});
    window.open(result.link,"_blank","noopener");

    alert("Dokument konnte nicht geöffnet werden: "+error.message);

}
async function deleteDropboxDocument(id){
  const doc=(data.documents||[]).find(d=>d.id===id);
  if(!doc)return;
  if(!confirm(`Dokument „${doc.name}“ wirklich aus Dropbox löschen?`))return;

async function compressImage(file,maxWidth=1200,quality=.72){
  if(!file.type.startsWith("image/"))return file;
  const bitmap=await createImageBitmap(file);
  const scale=Math.min(1,maxWidth/bitmap.width);
  const canvas=document.createElement("canvas");canvas.width=Math.round(bitmap.width*scale);canvas.height=Math.round(bitmap.height*scale);
  canvas.getContext("2d").drawImage(bitmap,0,0,canvas.width,canvas.height);
  const blob=await new Promise(resolve=>canvas.toBlob(resolve,"image/jpeg",quality));
  bitmap.close?.();return blob||file;
}

    if(!p){p={section,images:[]};data.materialProfiles.push(p)}

function updatePaymentPreview(){
  if(!document.getElementById("paymentPreview"))return;
  const amount=Math.max(0,Number(eAmount.value)||0);
  const eq=Math.max(0,Number(eEquityPaid.value)||0);
  const loan=Math.max(0,Number(eLoanPaid.value)||0);
  const paid=eq+loan, open=Math.max(0,amount-paid);
  const key=paid<=0?"Offen":paid<amount?"Teilweise bezahlt":"Vollständig bezahlt";
  const treatment=document.getElementById("eBudgetTreatment")?.value==="additional"
    ?"Zusätzlicher Nachtrag: wird vollständig zur Prognose addiert"

  paymentPreview.innerHTML=`<strong>${key}</strong><br>Bezahlt ${euro(paid)} · Rest ${euro(open)}<br>${treatment}`;

function saveExpense(id){
  const amount=Number(eAmount.value), equityPaid=Math.max(0,Number(eEquityPaid.value)||0), loanPaid=Math.max(0,Number(eLoanPaid.value)||0), isAdditional=eBudgetTreatment.value==="additional";
  const existing=data.expenses.find(x=>x.id===id);
  if(!eTitle.value.trim()||amount<=0)return alert("Bitte Bezeichnung und gültigen Rechnungsbetrag eingeben.");
  if(equityPaid+loanPaid>amount+0.005)return alert("Eigenkapital und Darlehen dürfen zusammen nicht höher als der Rechnungsbetrag sein.");

  const otherEquity=totalEquityUsed()-(existing?Number(existing.equityPaid)||0:0);
  const otherLoan=totalLoanUsed()-(existing?Number(existing.loanPaid)||0:0);
  if(otherEquity+equityPaid>Number(data.equityTotal)+0.005)return alert(`Das verfügbare Eigenkapital wird überschritten. Noch zuordenbar: ${euro(Math.max(0,data.equityTotal-otherEquity))}.`);
  if(otherLoan+loanPaid>Number(data.loanTotal)+0.005)return alert(`Das verfügbare Darlehen wird überschritten. Noch zuordenbar: ${euro(Math.max(0,data.loanTotal-otherLoan))}.`);

  const fullyAllocated=equityPaid+loanPaid>=amount-0.005;
  const obj={
    id:id||crypto.randomUUID(),categoryId:eCat.value,title:eTitle.value.trim(),amount,date:eDate.value,company:eCompany.value,
    equityPaid,loanPaid,isAdditional,paid:fullyAllocated,note:eNote.value
  };
  const i=data.expenses.findIndex(x=>x.id===id);
  if(i>=0)data.expenses[i]=obj;else data.expenses.push(obj);
  closeModal();persist();
}
function deleteExpense(id){

}

function b64u(bytes){return btoa(String.fromCharCode(...new Uint8Array(bytes))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"" )}
function verifier(){const b=new Uint8Array(64);crypto.getRandomValues(b);return b64u(b)}
async function sha(v){return crypto.subtle.digest("SHA-256",new TextEncoder().encode(v))}
function dbTokens(){try{return JSON.parse(localStorage.getItem(DROPBOX_TOKEN_KEY)||"null")}catch{return null}}
function saveDbTokens(t){localStorage.setItem(DROPBOX_TOKEN_KEY,JSON.stringify(t))}
function setHeaderSyncText(text){
  const e=document.getElementById("lastSavedText");
  if(e){e.dataset.syncText=text;e.textContent=text}
}
function syncState(type,text){
  const e=document.getElementById("dropboxSyncState");
  if(e)e.innerHTML=`<span class="sync-dot ${type||""}"></span><span>${esc(text)}</span>`;
  if(type==="syncing")setHeaderSyncText("wird synchronisiert …");
  else if(type==="connected"&&text.toLowerCase().includes("synchron"))setHeaderSyncText("synchronisiert");
  else if(type==="error")setHeaderSyncText("Synchronisierung fehlgeschlagen");
}
function localTimestamp(){return new Date(data.lastSavedAt||0).getTime()||0}
function remoteTimestamp(payload){return new Date(payload?.appData?.lastSavedAt||payload?.updatedAt||0).getTime()||0}
function formatDropboxTime(value){
  if(!value)return "noch nie";
  const d=new Date(value);
  return isNaN(d)?"unbekannt":d.toLocaleString("de-DE");
}
function markDropboxClean(meta,payload){
  if(meta?.rev)localStorage.setItem(DROPBOX_REV_KEY,meta.rev);
  if(payload?.updatedAt)localStorage.setItem(DROPBOX_REMOTE_TIME_KEY,payload.updatedAt);
  localStorage.removeItem(DROPBOX_DIRTY_KEY);
  data.lastDropboxSyncAt=new Date().toISOString();
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}
async function connectDropbox(){
  const v=verifier(),c=b64u(await sha(v)),s=verifier().slice(0,32);
  sessionStorage.setItem("db_v",v);sessionStorage.setItem("db_s",s);
  const q=new URLSearchParams({client_id:DROPBOX_APP_KEY,response_type:"code",redirect_uri:DROPBOX_REDIRECT_URI,code_challenge:c,code_challenge_method:"S256",token_access_type:"offline",state:s});
  location.href=`https://www.dropbox.com/oauth2/authorize?${q}`;
}
async function handleDropboxOAuthReturn(){
  const q=new URLSearchParams(location.search),code=q.get("code");
  if(!code)return;
  if(q.get("state")!==sessionStorage.getItem("db_s"))return alert("Dropbox-Anmeldung ungültig.");
  const body=new URLSearchParams({code,grant_type:"authorization_code",client_id:DROPBOX_APP_KEY,redirect_uri:DROPBOX_REDIRECT_URI,code_verifier:sessionStorage.getItem("db_v")});
  const r=await fetch("https://api.dropboxapi.com/oauth2/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});
  const x=await r.json();
  if(!r.ok)return alert("Dropbox-Verbindung fehlgeschlagen.");
  saveDbTokens({access_token:x.access_token,refresh_token:x.refresh_token,expires_at:Date.now()+x.expires_in*1000-60000});
  sessionStorage.removeItem("db_v");sessionStorage.removeItem("db_s");
  history.replaceState({},document.title,DROPBOX_REDIRECT_URI);
  render();
  await compareDropboxOnStart(true);
}
async function dbToken(){
  let t=dbTokens();if(!t)return null;
  if(Date.now()<t.expires_at)return t.access_token;
  const body=new URLSearchParams({grant_type:"refresh_token",refresh_token:t.refresh_token,client_id:DROPBOX_APP_KEY});
  const r=await fetch("https://api.dropboxapi.com/oauth2/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});
  const x=await r.json();
  if(!r.ok)throw Error("Dropbox-Verbindung abgelaufen");
  t={...t,access_token:x.access_token,expires_at:Date.now()+x.expires_in*1000-60000};saveDbTokens(t);return t.access_token;
}
async function dbApi(path,body){
  const token=await dbToken();if(!token)throw Error("Dropbox ist nicht verbunden");
  const r=await fetch(`https://api.dropboxapi.com/2/${path}`,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(body||{})});
  const x=await r.json().catch(()=>({}));
  if(!r.ok)throw Object.assign(Error(x.error_summary||"Dropbox-Fehler"),{status:r.status,result:x});
  return x;
}
async function downloadDb(){
  const token=await dbToken();
  const r=await fetch("https://content.dropboxapi.com/2/files/download",{method:"POST",headers:{Authorization:`Bearer ${token}`,"Dropbox-API-Arg":JSON.stringify({path:DROPBOX_SYNC_FILE})}});
  if(r.status===409)throw Object.assign(Error("Keine Dropbox-Daten gefunden"),{code:"not_found"});
  if(!r.ok)throw Error("Dropbox-Daten konnten nicht geladen werden");
  const meta=JSON.parse(r.headers.get("dropbox-api-result")||"{}");
  const payload=await r.json();
  if(!payload.appData)throw Error("Ungültige Dropbox-Datei");
  return {meta,payload};
}

async function uploadDb(force=false){
  const token=await dbToken();
  const rev=force?null:localStorage.getItem(DROPBOX_REV_KEY);
  const updatedAt=new Date().toISOString();
  const payload={format:"HausBudget-Dropbox",schemaVersion:1,appVersion:APP_VERSION,updatedAt,deviceId:getDeviceId(),appData:data};
  const mode=rev?{'.tag':'update',update:rev}:{'.tag':'overwrite'};
  const r=await fetch("https://content.dropboxapi.com/2/files/upload",{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/octet-stream","Dropbox-API-Arg":JSON.stringify({path:DROPBOX_SYNC_FILE,mode,autorename:false,mute:true,strict_conflict:true})},body:JSON.stringify(payload)});
  const x=await r.json().catch(()=>({}));
  if(!r.ok)throw Object.assign(Error(x.error_summary||"Upload fehlgeschlagen"),{status:r.status,result:x});
  markDropboxClean(x,payload);
  return {meta:x,payload};
}

async function syncToDropbox(show=false){
  if(dropboxSyncInProgress)return;
  if(!dbTokens())return show&&alert("Bitte zuerst Dropbox verbinden.");
  dropboxSyncInProgress=true;syncState("syncing","wird synchronisiert …");
  try{
    const hasRev=!!localStorage.getItem(DROPBOX_REV_KEY);
    if(!hasRev){
      try{
        const remote=await downloadDb();
        const rt=remoteTimestamp(remote.payload),lt=localTimestamp();
        localStorage.setItem(DROPBOX_REV_KEY,remote.meta.rev||"");
        localStorage.setItem(DROPBOX_REMOTE_TIME_KEY,remote.payload.updatedAt||"");
        if(rt>lt+1000){
          syncState("error","Dropbox enthält einen neueren Stand");
          if(show)alert("Dropbox enthält einen neueren Stand. Bitte zuerst „Von Dropbox laden“ wählen.");
          return;
        }
        if(rt&&lt>rt+1000&&!show){
          syncState("error","Lokaler Stand ist neuer – Bestätigung erforderlich");
          return;
        }
      }catch(e){
        if(e.code!=="not_found")throw e;
      }
    }
    await uploadDb(false);
    syncState("connected",`synchronisiert · Dropbox-Stand ${formatDropboxTime(localStorage.getItem(DROPBOX_REMOTE_TIME_KEY))}`);
    if(show)alert("Synchronisierung erfolgreich.");
  }catch(e){
    if(e.status===409){
      syncState("error","Konflikt erkannt");
      const b=document.getElementById("dropboxConflict");
      if(b)b.innerHTML='<div class="conflict-box"><strong>Konflikt</strong><br>Dropbox enthält einen anderen Stand. Lade zuerst den Dropbox-Stand oder überschreibe ihn bewusst.<div class="actions"><button class="secondary" onclick="loadFromDropbox()">Dropbox laden</button><button onclick="forceDropboxUpload()">Lokalen Stand hochladen</button></div></div>';
    }else{
      syncState("error","Synchronisierung fehlgeschlagen");
      if(show)alert(e.message);
    }
  }finally{dropboxSyncInProgress=false}
}

async function applyRemoteData(remote,ask=true){
  const remoteDate=formatDropboxTime(remote.payload.updatedAt);
  if(ask&&!confirm(`Dropbox-Stand vom ${remoteDate} laden und lokale Daten ersetzen?`))return false;
  await createInternalRecoveryPoint("Vor Laden aus Dropbox",true);
  data=remote.payload.appData;
  ensureDataShape();
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  markDropboxClean(remote.meta,remote.payload);
  render();
  return true;
}
async function loadFromDropbox(){
  if(!dbTokens())return alert("Bitte zuerst Dropbox verbinden.");
  try{
    syncState("syncing","Dropbox-Daten werden geladen …");
    const remote=await downloadDb();
    if(await applyRemoteData(remote,true)){
      syncState("connected",`synchronisiert · Dropbox-Stand ${formatDropboxTime(remote.payload.updatedAt)}`);
      alert("Dropbox-Daten geladen.");
    }
  }catch(e){alert(e.message)}
}
async function compareDropboxOnStart(firstConnection=false){
  if(!dbTokens())return;
  try{
    syncState("syncing","Dropbox-Stand wird geprüft …");
    const remote=await downloadDb();
    const remoteRev=remote.meta.rev||"";
    const knownRev=localStorage.getItem(DROPBOX_REV_KEY)||"";
    const dirty=localStorage.getItem(DROPBOX_DIRTY_KEY)==="1";

    localStorage.setItem(DROPBOX_REMOTE_TIME_KEY,remote.payload.updatedAt||remote.payload.appData?.lastSavedAt||"");

    // Same Dropbox revision and no local changes means both sides are identical.
    if(remoteRev&&knownRev&&remoteRev===knownRev&&!dirty){
      markDropboxClean(remote.meta,remote.payload);
      syncState("connected",`synchronisiert · Dropbox-Stand ${formatDropboxTime(remote.payload.updatedAt||remote.payload.appData?.lastSavedAt)}`);
      return;
    }

    const rt=remoteTimestamp(remote.payload);
    const lt=localTimestamp();

    // A genuinely newer remote data revision should be offered for loading.
    if(rt>lt+1000){
      const load=confirm(`Dropbox enthält einen neueren Stand vom ${formatDropboxTime(remote.payload.appData?.lastSavedAt||remote.payload.updatedAt)}.\n\nJetzt automatisch laden?`);
      if(load)await applyRemoteData(remote,false);
      else syncState("error","Neuerer Dropbox-Stand verfügbar");
      return;
    }

    // Local edits or a genuinely newer local data timestamp should be uploaded.
    if(lt>rt+1000||dirty){
      localStorage.setItem(DROPBOX_REV_KEY,remoteRev);
      const upload=confirm(firstConnection
        ?"Auf diesem Gerät liegen lokale HausBudget-Daten. Möchtest du sie jetzt nach Dropbox übertragen?"
        :`Der lokale Stand ist neuer als Dropbox.\n\nLokaler Stand: ${formatDropboxTime(data.lastSavedAt)}\nDropbox-Stand: ${formatDropboxTime(remote.payload.appData?.lastSavedAt||remote.payload.updatedAt)}\n\nJetzt nach Dropbox synchronisieren?`);
      if(upload)await syncToDropbox(true);
      else syncState("error","Lokale Änderungen noch nicht synchronisiert");
      return;
    }

    // Timestamps can differ slightly because the Dropbox upload envelope is created later.
    // If neither data set is genuinely newer, accept the current remote revision as synced.
    markDropboxClean(remote.meta,remote.payload);
    syncState("connected",`synchronisiert · Dropbox-Stand ${formatDropboxTime(remote.payload.updatedAt||remote.payload.appData?.lastSavedAt)}`);
  }catch(e){
    if(e.code==="not_found"){
      const upload=confirm("In Dropbox ist noch kein HausBudget-Datenstand vorhanden. Möchtest du die lokalen Daten jetzt hochladen?");
      if(upload)await uploadDb(true);
      else syncState("error","Dropbox noch leer");
    }else{
      console.error(e);
      syncState("error","Dropbox-Vergleich fehlgeschlagen");
    }
  }
}

async function listInternalRecoveryPoints(){
  const db=await openDocDB();
  return new Promise((resolve,reject)=>{
    const r=db.transaction(BACKUP_STORE,"readonly").objectStore(BACKUP_STORE).getAll();
    r.onsuccess=()=>resolve(r.result.sort((a,b)=>b.createdAt.localeCompare(a.createdAt)));
    r.onerror=()=>reject(r.error);
  });
}

async function createInternalRecoveryPoint(reason="Automatisch erstellt", silent=false){
  try{
    const docs=[];
    const point={
      id:crypto.randomUUID(),
      createdAt:new Date().toISOString(),
      reason,
      appVersion:localStorage.getItem(VERSION_KEY)||APP_VERSION,
      appData:JSON.parse(JSON.stringify(data)),
      documents:docs
    };
    const db=await openDocDB();
    await new Promise((resolve,reject)=>{
      const tx=db.transaction(BACKUP_STORE,"readwrite");
      tx.objectStore(BACKUP_STORE).put(point);
      tx.oncomplete=resolve;
      tx.onerror=()=>reject(tx.error);
    });

    // Keep only the 5 most recent points.
    const all=await listInternalRecoveryPoints();
    if(all.length>5){
      const db2=await openDocDB();
      await new Promise((resolve,reject)=>{
        const tx=db2.transaction(BACKUP_STORE,"readwrite");
        const store=tx.objectStore(BACKUP_STORE);
        all.slice(5).forEach(x=>store.delete(x.id));
        tx.oncomplete=resolve;
        tx.onerror=()=>reject(tx.error);
      });
    }

    if(!silent){
      alert("Interner Wiederherstellungspunkt wurde erstellt.");
      renderBackupStatus();
  renderDropboxStatus();
    }
    return true;
  }catch(error){
    console.error(error);
    if(!silent)alert("Der interne Wiederherstellungspunkt konnte nicht erstellt werden.");
    return false;
  }
}

async function restoreInternalRecoveryPoint(id){
  try{
    const db=await openDocDB();
    const point=await new Promise((resolve,reject)=>{
      const r=db.transaction(BACKUP_STORE,"readonly").objectStore(BACKUP_STORE).get(id);
      r.onsuccess=()=>resolve(r.result);
      r.onerror=()=>reject(r.error);
    });
    if(!point)throw new Error("Recovery point not found");
    if(!confirm(`Wiederherstellungspunkt vom ${new Date(point.createdAt).toLocaleString("de-DE")} einspielen? Die aktuellen lokalen Daten werden ersetzt.`))return;

    data=point.appData;
    ensureDataShape();
    data.lastSavedAt=new Date().toISOString();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));

    const db2=await openDocDB();
    await new Promise((resolve,reject)=>{
      const tx=db2.transaction(DOC_STORE,"readwrite");
      const store=tx.objectStore(DOC_STORE);
      store.clear();
      (point.documents||[]).forEach(doc=>store.put(doc));
      tx.oncomplete=resolve;
      tx.onerror=()=>reject(tx.error);
    });

    render();
    alert("Wiederherstellungspunkt wurde erfolgreich eingespielt.");
  }catch(error){
    console.error(error);
    alert("Der Wiederherstellungspunkt konnte nicht eingespielt werden.");
  }
}

function blobToDataURL(blob){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=()=>reject(reader.error);
    reader.readAsDataURL(blob);
  });
}

function dataURLToBlob(dataURL){
  const parts=dataURL.split(",");
  const mime=(parts[0].match(/:(.*?);/)||[])[1]||"application/octet-stream";
  const binary=atob(parts[1]||"");
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  return new Blob([bytes],{type:mime});
}

async function createFullBackup(){
  try{
    const docs=[];
    const exportedDocs=[];
    for(const doc of docs){
      exportedDocs.push({
        id:doc.id,
        name:doc.name,
        type:doc.type,
        size:doc.size,
        category:doc.category,
        createdAt:doc.createdAt,
        dataURL:await blobToDataURL(doc.blob)
      });
    }

    const backup={
      format:"HausBudget-Backup",
      version:1,
      createdAt:new Date().toISOString(),
      appData:data,
      documents:exportedDocs
    };

    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const date=new Date().toISOString().slice(0,10);
    a.href=url;
    a.download=`HausBudget_Backup_${date}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),30000);
    data.lastExternalBackupAt=new Date().toISOString();
    data.lastSavedAt=new Date().toISOString();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    render();
    alert(`Backup erstellt: ${data.categories.length} Posten, ${data.expenses.length} Buchungen und ${exportedDocs.length} Dokumente.`);
  }catch(error){
    console.error(error);
    alert("Das Backup konnte nicht erstellt werden. Bitte erneut versuchen.");
  }
}

async function importFullBackup(file){
  if(!file)return;
  try{
    const text=await file.text();
    const backup=JSON.parse(text);

    if(backup.format!=="HausBudget-Backup"||!backup.appData||!Array.isArray(backup.appData.categories)||!Array.isArray(backup.appData.expenses)){
      throw new Error("Ungültiges Backup-Format");
    }

    const created=backup.createdAt?new Date(backup.createdAt).toLocaleString("de-DE"):"unbekannt";
    const confirmed=confirm(
      `Backup vom ${created} einspielen?\n\n`+
      `${backup.appData.categories.length} Posten\n`+
      `${backup.appData.expenses.length} Buchungen\n`+
      `${Array.isArray(backup.documents)?backup.documents.length:0} Dokumente\n\n`+
      `Die derzeitigen lokalen Daten werden vollständig ersetzt.`
    );
    if(!confirmed)return;

    data=backup.appData;
    ensureDataShape();
    data.lastSavedAt=new Date().toISOString();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));

    if(Array.isArray(backup.documents)&&typeof openDocDB==="function"){
      const db=await openDocDB();
      await new Promise((resolve,reject)=>{
        const tx=db.transaction(DOC_STORE,"readwrite");
        const store=tx.objectStore(DOC_STORE);
        store.clear();
        for(const doc of backup.documents){
          store.put({
            id:doc.id||crypto.randomUUID(),
            name:doc.name||"Dokument",
            type:doc.type||"application/octet-stream",
            size:Number(doc.size)||0,
            category:doc.category||"Sonstiges",
            createdAt:doc.createdAt||new Date().toISOString(),
            blob:dataURLToBlob(doc.dataURL)
          });
        }
        tx.oncomplete=resolve;
        tx.onerror=()=>reject(tx.error);
      });
    }

    expenseSearchText="";
    expenseCategoryFilter="";
    expenseStatusFilter="all";
    expenseSort="date-desc";
    expenseDateFrom="";
    expenseDateTo="";
    expandedCategoryId="";
    render();
    alert("Backup wurde erfolgreich eingespielt.");
  }catch(error){
    console.error(error);
    alert("Diese Datei ist kein gültiges HausBudget-Backup oder konnte nicht gelesen werden.");
  }
}

function exportCSV(){
  let rows=[["Datum","Kategorie","Bezeichnung","Firma","Betrag","Bezahlt","Notiz"]];
  data.expenses.forEach(x=>rows.push([x.date,data.categories.find(c=>c.id===x.categoryId)?.name||"",x.title,x.company,x.amount,x.paid?"Ja":"Nein",x.note]));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(";")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="HausBudget.csv";a.click();
}
initializeApp();
