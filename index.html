<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f3f4f6">
  <title>HausBudget 0.9</title>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;color:#0f172a;background:#eef2f7;--primary:#2563eb;--muted:#64748b;--border:#dbe3ee}
    *{box-sizing:border-box}
    body{margin:0;padding:env(safe-area-inset-top) 0 calc(86px + env(safe-area-inset-bottom));background:radial-gradient(circle at top right,rgba(37,99,235,.12),transparent 32%),linear-gradient(180deg,#f8fafc 0,#eef2f7 100%);min-height:100vh}
    header{position:sticky;top:0;z-index:10;background:rgba(248,250,252,.88);backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid rgba(203,213,225,.75);padding:14px 18px 12px}
    h1{margin:0;font-size:23px;letter-spacing:-.4px}.subtitle{color:#64748b;font-size:12px;margin-top:2px}.header-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:12px}.brand-icon{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;color:#fff;font-size:21px;background:linear-gradient(135deg,#2563eb,#7c3aed);box-shadow:0 10px 24px rgba(37,99,235,.26)}.version-chip{font-size:11px;font-weight:700;color:#1e40af;background:#dbeafe;padding:6px 9px;border-radius:999px}
    main{max-width:760px;margin:auto;padding:14px}
    .card{background:rgba(255,255,255,.96);border:1px solid rgba(219,227,238,.9);border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 10px 30px rgba(15,23,42,.07)}
    .hero{background:linear-gradient(135deg,#1d4ed8 0%,#2563eb 50%,#7c3aed 100%);color:#fff;border:0;box-shadow:0 18px 40px rgba(37,99,235,.24)}
    .hero .muted{color:rgba(255,255,255,.8)}.hero-amount{font-size:34px;font-weight:800;margin:5px 0 12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .metric{background:#fff;border-radius:16px;padding:14px;min-width:0}
    .metric strong{display:block;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .muted{color:#6b7280;font-size:13px}
    .progress{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden}.bar{height:100%;background:#22c55e}
    .row{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid #eee}.row:last-child{border-bottom:0}
    .grow{flex:1;min-width:0}.amount{font-weight:750}.over{color:#dc2626}.ok{color:#15803d}.warn{color:#d97706}
    .pill{display:inline-block;font-size:11px;padding:4px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;margin-top:5px}
    button{border:0;border-radius:14px;padding:12px 14px;font-weight:750;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-size:15px;box-shadow:0 8px 18px rgba(37,99,235,.20)}
    button.secondary{background:#eef2f7;color:#0f172a;box-shadow:none;border:1px solid #dbe3ee}button.danger{background:#dc2626}
    .actions{display:flex;gap:10px;margin:12px 0}.actions>*{flex:1}
    label{display:block;font-size:13px;color:#6b7280;margin:10px 0 5px}
    input,select,textarea{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;background:#fff;font-size:16px}
    textarea{min-height:76px}
    .tabs{position:fixed;bottom:0;left:0;right:0;z-index:8;background:#fff;border-top:1px solid #ddd;display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}
    .tabs button{background:transparent;color:#64748b;border-radius:12px;padding:9px 4px;font-size:11px;box-shadow:none;display:flex;flex-direction:column;gap:3px;align-items:center}.tabs button.active{color:#1d4ed8;background:#eff6ff}.tabs .icon{font-size:18px;line-height:1}
    .traffic{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
    .light{border-radius:14px;padding:12px;text-align:center;background:#f3f4f6}
    .light.active.green{background:#dcfce7;color:#166534}.light.active.yellow{background:#fef3c7;color:#92400e}.light.active.red{background:#fee2e2;color:#991b1b}
    .big-progress{font-size:30px;font-weight:800;margin:6px 0}.doc-meta{font-size:12px;color:#6b7280;margin-top:3px}.empty{padding:18px;text-align:center;color:#6b7280}
    .filters{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.filters .wide{grid-column:1/-1}.category-card{cursor:pointer}.booking-list{margin-top:12px;border-top:1px solid #edf1f5;padding-top:8px}.booking-mini{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px dashed #e2e8f0;font-size:13px}.booking-mini:last-child{border-bottom:0}.section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.section-title h2{font-size:17px;margin:0}.hidden{display:none}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;z-index:20}
    .sheet{background:#f9fafb;width:100%;max-height:92vh;overflow:auto;border-radius:22px 22px 0 0;padding:18px}
    @media(min-width:700px){.modal{align-items:center;justify-content:center}.sheet{max-width:560px;border-radius:22px}}
  </style>
</head>
<body>
<header><div class="header-row"><div class="brand"><div class="brand-icon">⌂</div><div><h1>HausBudget</h1><div class="subtitle" id="projectTitle"></div></div></div><div><div class="version-chip">v0.9</div><div class="subtitle" id="lastSavedText" style="text-align:right;margin-top:4px"></div></div></div></header>

<main>
  <section id="dashboard"></section>
  <section id="categories" class="hidden"></section>
  <section id="expenses" class="hidden"></section>
  <section id="documents" class="hidden"></section><section id="settings" class="hidden"></section>
</main>

<nav class="tabs"><button data-tab="dashboard" class="active"><span class="icon">⌂</span><span>Übersicht</span></button><button data-tab="categories"><span class="icon">▦</span><span>Posten</span></button><button data-tab="expenses"><span class="icon">€</span><span>Ausgaben</span></button><button data-tab="documents"><span class="icon">▤</span><span>Dokumente</span></button><button data-tab="settings"><span class="icon">⚙</span><span>Projekt</span></button></nav>

<button class="global-help" onclick="openHelpCenter()" aria-label="Hilfe öffnen">?</button>
<div id="modalRoot"></div>
<div id="onboardingRoot"></div>

<script>
const STORAGE_KEY="hausbudget_demo_v1";
const APP_VERSION="0.9";
const VERSION_KEY="hausbudget_app_version";
const BACKUP_REMINDER_DAYS=14;
const BACKUP_STORE="backups";

const ONBOARDING_KEY="hausbudget_onboarding_seen_v1";
const DROPBOX_APP_KEY="qkdn7nm2yqdhmep";
const DROPBOX_REDIRECT_URI="https://voigtdavid7-spec.github.io/Hausbudget-demo/";
const DROPBOX_TOKEN_KEY="hausbudget_dropbox_tokens_v1";
const DROPBOX_REV_KEY="hausbudget_dropbox_rev_v1";
const DROPBOX_SYNC_FILE="/hausbudget-daten.json";
let dropboxSyncTimer=null,dropboxSyncInProgress=false;

const HELP_TOPICS={
  totalBudget:{
    title:"Gesamtbudget",
    category:"Budget",
    text:"Das Gesamtbudget ist der Betrag, den ihr für das gesamte Hausbauprojekt ausgeben möchtet.",
    formula:"Gesamtbudget = euer festgelegter Kostenrahmen",
    example:"Beispiel: 486.000 € Gesamtbudget."
  },
  forecast:{
    title:"Prognostizierte Endkosten",
    category:"Budget",
    text:"Die App schätzt damit, wie hoch eure gesamten Kosten am Ende voraussichtlich sein werden. Pro Budgetposten wird mindestens der geplante Betrag angesetzt. Liegen die gebuchten Kosten schon darüber, verwendet die App den höheren Ist-Wert.",
    formula:"Summe je Posten aus:\nmax(geplant, bereits gebucht)",
    example:"Küche geplant 18.000 €, bereits gebucht 21.500 € → Prognose für Küche: 21.500 €."
  },
  reserve:{
    title:"Prognostizierte Endreserve",
    category:"Budget",
    text:"Diese Kennzahl zeigt, wie viel von eurem Gesamtbudget nach aktueller Prognose am Ende übrig bleibt.",
    formula:"Gesamtbudget\n− prognostizierte Endkosten\n= prognostizierte Endreserve",
    example:"486.000 € Budget − 455.000 € Prognose = 31.000 € Endreserve."
  },
  reserveTarget:{
    title:"Mindestpuffer",
    category:"Budget",
    text:"Der Mindestpuffer ist eure gewünschte Sicherheitsreserve. Die Budgetampel richtet sich nach diesem Wert.",
    formula:"Endreserve ≥ Mindestpuffer → Grün\nEndreserve 0 bis unter Mindestpuffer → Gelb\nEndreserve negativ → Rot",
    example:"Bei 20.000 € Mindestpuffer und 14.000 € Endreserve zeigt die App Gelb."
  },
  budgetLight:{
    title:"Budgetampel",
    category:"Budget",
    text:"Die Ampel bewertet, ob eure prognostizierte Endreserve ausreichend ist.",
    formula:"Grün: Mindestpuffer erreicht\nGelb: Mindestpuffer unterschritten\nRot: Gesamtbudget überschritten",
    example:"Die Ampel reagiert auf die Prognose, nicht nur auf bereits bezahlte Rechnungen."
  },
  plannedAmount:{
    title:"Geplantes Budget eines Postens",
    category:"Posten",
    text:"Hier tragt ihr ein, wie viel ihr für ein Gewerk oder einen Kostenblock maximal einplant.",
    formula:"Posten-Restbudget = geplant − gebuchte Kosten",
    example:"Fliesen geplant 8.500 €, gebucht 6.000 € → 2.500 € verbleiben."
  },
  buildProgress:{
    title:"Baufortschritt",
    category:"Projekt",
    text:"Der Baufortschritt ist aktuell ein manuell gesetzter Prozentwert. Er dient nur der Übersicht und wird nicht automatisch aus Rechnungen berechnet.",
    formula:"0 % = noch nicht begonnen\n100 % = abgeschlossen",
    example:"Nach Hausstellung könnt ihr den Wert beispielsweise auf 45 % setzen."
  },
  invoiceAmount:{
    title:"Rechnungsbetrag",
    category:"Buchungen",
    text:"Der Rechnungsbetrag ist der vollständige Betrag der Ausgabe, unabhängig davon, ob bereits alles bezahlt wurde.",
    formula:"Offener Betrag = Rechnungsbetrag − zugeordnete Zahlungen",
    example:"20.000 € Rechnung, davon 15.000 € bezahlt → 5.000 € offen."
  },
  equityPaid:{
    title:"Aus Eigenkapital bezahlt",
    category:"Finanzierung",
    text:"Hier tragt ihr nur den Teil der Rechnung ein, der tatsächlich aus eurem Eigenkapital bezahlt wurde.",
    formula:"Eigenkapital-Rest = Eigenkapital gesamt − Summe aller EK-Zahlungen",
    example:"Von einer 10.000-€-Rechnung wurden 3.000 € aus Eigenkapital bezahlt."
  },
  loanPaid:{
    title:"Aus Darlehen bezahlt",
    category:"Finanzierung",
    text:"Hier tragt ihr den Teil der Rechnung ein, der aus dem Darlehen bezahlt wurde.",
    formula:"Darlehens-Rest = Darlehen gesamt − Summe aller Darlehenszahlungen",
    example:"Von einer 10.000-€-Rechnung wurden 7.000 € aus dem Darlehen bezahlt."
  },
  paymentStatus:{
    title:"Zahlungsstatus",
    category:"Buchungen",
    text:"Der Status wird automatisch aus den zugeordneten Zahlungsbeträgen berechnet.",
    formula:"0 € zugeordnet → Offen\nTeilbetrag zugeordnet → Teilweise bezahlt\nGesamtbetrag zugeordnet → Bezahlt",
    example:"Bei älteren Buchungen kann 'Bezahlt · Quelle offen' erscheinen, bis ihr Eigenkapital oder Darlehen zuordnet."
  },
  financing:{
    title:"Finanzierungsübersicht",
    category:"Finanzierung",
    text:"Die Übersicht zeigt, wie viel Eigenkapital und Darlehen bereits verwendet wurde und wie viel noch verfügbar ist.",
    formula:"Verfügbar = Gesamtbetrag − zugeordnete Zahlungen",
    example:"39.285 € Eigenkapital − 10.000 € verwendet = 29.285 € verfügbar."
  },
  documents:{
    title:"Dokumentenspeicher",
    category:"Dokumente",
    text:"Dokumente werden in der aktuellen Version lokal im Browser auf diesem Gerät gespeichert. Sie werden nicht automatisch mit anderen Geräten synchronisiert.",
    formula:"Speicherort: IndexedDB im Browser",
    example:"Ein PDF auf deinem iPhone ist nicht automatisch auf dem iPhone deiner Frau verfügbar."
  },
  localStorage:{
    title:"Automatische lokale Speicherung",
    category:"Datensicherung",
    text:"Budgetdaten werden bei jeder Änderung automatisch im Browser gespeichert. Du musst dafür keinen Speichern-Button drücken.",
    formula:"Änderung → sofortige lokale Speicherung",
    example:"Browser schließen und morgen erneut öffnen: Die Daten bleiben erhalten, solange Website-Daten nicht gelöscht werden."
  },
  externalBackup:{
    title:"Externes Backup",
    category:"Datensicherung",
    text:"Ein externes Backup ist eine heruntergeladene JSON-Datei. Diese kannst du in iCloud Drive oder Google Drive aufbewahren.",
    formula:"Externes Backup = App-Daten + lokale Dokumente",
    example:"Nach größeren Änderungen empfiehlt sich ein neues Backup."
  },
  internalRecovery:{
    title:"Interner Wiederherstellungspunkt",
    category:"Datensicherung",
    text:"Ein interner Wiederherstellungspunkt liegt ebenfalls lokal im Browser. Er hilft bei einem App-Update, ersetzt aber kein externes Backup.",
    formula:"Intern = schnell wiederherstellbar\nExtern = auch außerhalb des Browsers gesichert",
    example:"Wenn Safari-Website-Daten gelöscht werden, können auch interne Wiederherstellungspunkte verloren gehen."
  },
  dropboxSync:{title:"Dropbox-Synchronisierung",category:"Synchronisierung",text:"Budgetdaten werden lokal gespeichert und zusätzlich als JSON-Datei im geschützten Dropbox-App-Ordner synchronisiert.",formula:"Lokale Speicherung → Dropbox-Synchronisierung\nDatei: hausbudget-daten.json",example:"Bei fehlendem Internet bleiben Änderungen lokal erhalten."},
  filters:{
    title:"Buchungssuche und Filter",
    category:"Buchungen",
    text:"Du kannst nach Posten, Firma, Buchungstitel und Notizen suchen sowie nach Status, Zeitraum und Sortierung filtern.",
    formula:"Suchfeld + Filter = passende Buchungsliste",
    example:"Suche nach 'Grundstück' zeigt alle Buchungen des Postens Grundstück."
  }
};

const sampleData=()=>({
  projectName:"Unser Hausbau",
  totalBudget:486000,
  reserveTarget:20000,buildProgress:35,equityTotal:39285,loanTotal:486000,
  categories:[
    {id:"grund",name:"Grundstück",planned:77400,status:"Abgeschlossen",note:""},
    {id:"arch",name:"Architekt",planned:6000,status:"Abgeschlossen",note:""},
    {id:"boden",name:"Bodenplatte",planned:23335,status:"Beauftragt",note:""},
    {id:"haus",name:"Haus",planned:330245,status:"In Arbeit",note:""},
    {id:"kueche",name:"Küche",planned:18000,status:"In Planung",note:""},
    {id:"aussen",name:"Außenanlagen",planned:25000,status:"Nicht begonnen",note:""}
  ],
  expenses:[
    {id:crypto.randomUUID(),categoryId:"grund",title:"Kaufpreis Grundstück",amount:77400,date:"2026-02-01",company:"Privat",paid:true,equityPaid:0,loanPaid:0,note:""},
    {id:crypto.randomUUID(),categoryId:"arch",title:"Architektenleistungen",amount:6850,date:"2026-04-01",company:"Architekturbüro",paid:true,equityPaid:0,loanPaid:0,note:""},
    {id:crypto.randomUUID(),categoryId:"boden",title:"Abschlagszahlung",amount:8000,date:"2026-06-20",company:"Bauunternehmen",paid:true,equityPaid:0,loanPaid:0,note:""},
    {id:crypto.randomUUID(),categoryId:"haus",title:"1. Hausrate",amount:45000,date:"2026-07-01",company:"Bien-Zenker",paid:false,equityPaid:0,loanPaid:0,note:""}
  ]
});

let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null")||sampleData();
if(typeof data.buildProgress!=="number")data.buildProgress=35;
if(typeof data.equityTotal!=="number")data.equityTotal=39285;
if(typeof data.loanTotal!=="number")data.loanTotal=486000;
data.expenses=(data.expenses||[]).map(x=>({
  ...x,
  equityPaid:Number(x.equityPaid)||0,
  loanPaid:Number(x.loanPaid)||0,
  paid:typeof x.paid==="boolean"?x.paid:false
}));

const euro=n=>new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(Number(n)||0);
const actual=id=>data.expenses.filter(x=>x.categoryId===id).reduce((s,x)=>s+Number(x.amount),0);
const totalActual=()=>data.expenses.reduce((s,x)=>s+Number(x.amount),0);
const totalPlanned=()=>data.categories.reduce((s,x)=>s+Number(x.planned),0);
const allocatedPaid=x=>(Number(x.equityPaid)||0)+(Number(x.loanPaid)||0);
const legacyUnassignedPaid=x=>x.paid&&allocatedPaid(x)===0?Number(x.amount)||0:0;
const paidAmount=x=>Math.min(Number(x.amount)||0,allocatedPaid(x)+legacyUnassignedPaid(x));
const openAmount=x=>Math.max(0,(Number(x.amount)||0)-paidAmount(x));
const paymentStatus=x=>{
  const amount=Number(x.amount)||0, allocated=allocatedPaid(x);
  if(x.paid&&allocated===0)return {key:"unassigned",label:"Bezahlt · Quelle offen"};
  if(allocated<=0)return {key:"open",label:"Offen"};
  if(allocated<amount)return {key:"partial",label:"Teilweise bezahlt"};
  return {key:"paid",label:"Bezahlt"};
};
const totalEquityUsed=()=>data.expenses.reduce((s,x)=>s+(Number(x.equityPaid)||0),0);
const totalLoanUsed=()=>data.expenses.reduce((s,x)=>s+(Number(x.loanPaid)||0),0);
const totalOpen=()=>data.expenses.reduce((s,x)=>s+openAmount(x),0);
const forecastTotal=()=>data.categories.reduce((sum,c)=>sum+Math.max(Number(c.planned)||0,actual(c.id)),0);
const currentReserve=()=>Number(data.totalBudget||0)-forecastTotal();
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));


function helpButton(topic){
  return `<button type="button" class="help-button" onclick="event.stopPropagation();openHelp('${topic}')" aria-label="Hilfe">i</button>`;
}

function openHelp(topic){
  const h=HELP_TOPICS[topic];
  if(!h)return;
  modal(`<div class="help-sheet">
    <div class="section-title"><h2>${esc(h.title)}</h2><button class="secondary small-button" onclick="closeModal()">Schließen</button></div>
    <p>${esc(h.text)}</p>
    ${h.formula?`<h3>Berechnung / Logik</h3><div class="formula">${esc(h.formula)}</div>`:""}
    ${h.example?`<div class="help-example"><strong>Beispiel</strong><p style="margin:5px 0 0">${esc(h.example)}</p></div>`:""}
  </div>`);
}

function openHelpCenter(searchText=""){
  const q=normalizeSearch(searchText);
  const groups={};
  Object.entries(HELP_TOPICS).forEach(([key,h])=>{
    const searchable=normalizeSearch([h.title,h.category,h.text,h.formula,h.example].join(" "));
    if(q&&!searchable.includes(q))return;
    if(!groups[h.category])groups[h.category]=[];
    groups[h.category].push({key,...h});
  });

  const content=Object.keys(groups).sort().map(category=>`
    <div class="help-category">${esc(category)}</div>
    ${groups[category].map(h=>`<div class="help-link" onclick="openHelp('${h.key}')">
      <div><strong>${esc(h.title)}</strong><div class="muted">${esc(h.text.slice(0,95))}${h.text.length>95?"…":""}</div></div><span>›</span>
    </div>`).join("")}
  `).join("");

  modal(`<div class="help-sheet">
    <div class="section-title"><h2>HausBudget-Hilfe</h2><button class="secondary small-button" onclick="closeModal()">Schließen</button></div>
    <input class="help-search" id="helpSearchInput" type="search" placeholder="Hilfe durchsuchen" value="${esc(searchText)}" oninput="refreshHelpCenter(this.value)">
    <div id="helpCenterResults">${content||`<div class="empty">Keine Erklärung gefunden.</div>`}</div>
  </div>`);
}

function refreshHelpCenter(value){
  const q=normalizeSearch(value);
  const groups={};
  Object.entries(HELP_TOPICS).forEach(([key,h])=>{
    const searchable=normalizeSearch([h.title,h.category,h.text,h.formula,h.example].join(" "));
    if(q&&!searchable.includes(q))return;
    if(!groups[h.category])groups[h.category]=[];
    groups[h.category].push({key,...h});
  });
  const target=document.getElementById("helpCenterResults");
  if(!target)return;
  target.innerHTML=Object.keys(groups).sort().map(category=>`
    <div class="help-category">${esc(category)}</div>
    ${groups[category].map(h=>`<div class="help-link" onclick="openHelp('${h.key}')">
      <div><strong>${esc(h.title)}</strong><div class="muted">${esc(h.text.slice(0,95))}${h.text.length>95?"…":""}</div></div><span>›</span>
    </div>`).join("")}
  `).join("")||`<div class="empty">Keine Erklärung gefunden.</div>`;
}

function showOnboarding(){
  if(localStorage.getItem(ONBOARDING_KEY))return;
  onboardingRoot.innerHTML=`<div class="onboarding">
    <div class="onboarding-card">
      <div class="onboarding-icon">⌂</div>
      <h2 style="margin:0">Willkommen bei HausBudget</h2>
      <p class="muted" style="font-size:14px;line-height:1.5">Die App begleitet euren Hausbau bei Budget, Zahlungen, Finanzierung und Dokumenten.</p>
      <div class="onboarding-steps">
        <div class="onboarding-step"><div class="onboarding-number">1</div><div><strong>Projektwerte prüfen</strong><div class="muted">Gesamtbudget, Mindestpuffer, Eigenkapital und Darlehen einstellen.</div></div></div>
        <div class="onboarding-step"><div class="onboarding-number">2</div><div><strong>Budgetposten anlegen</strong><div class="muted">Zum Beispiel Grundstück, Haus, Küche oder Außenanlagen.</div></div></div>
        <div class="onboarding-step"><div class="onboarding-number">3</div><div><strong>Buchungen erfassen</strong><div class="muted">Rechnungsbetrag und Zahlungsquelle zuordnen.</div></div></div>
        <div class="onboarding-step"><div class="onboarding-number">4</div><div><strong>Backup erstellen</strong><div class="muted">Externe Sicherung in iCloud Drive oder Google Drive ablegen.</div></div></div>
      </div>
      <button style="width:100%" onclick="finishOnboarding()">Los geht's</button>
    </div>
  </div>`;
}

function finishOnboarding(){
  localStorage.setItem(ONBOARDING_KEY,"1");
  onboardingRoot.innerHTML="";
}
function persist(){
  data.lastSavedAt=new Date().toISOString();
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  render();
  showOnboarding();
}

function render(){
  projectTitle.textContent=data.projectName;

let expenseSearchText="",expenseCategoryFilter="",expenseStatusFilter="all",expenseSort="date-desc",expenseDateFrom="",expenseDateTo="";
function normalizeSearch(v){return String(v||"").toLocaleLowerCase("de-DE").normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim()}
function updateExpenseSearch(v){expenseSearchText=v;renderExpenseResults()}
function updateExpenseFilter(){expenseCategoryFilter=filterCategory.value;expenseStatusFilter=filterStatus.value;expenseSort=filterSort.value;expenseDateFrom=filterFrom.value;expenseDateTo=filterTo.value;renderExpenseResults()}
function clearExpenseFilters(){expenseSearchText="";expenseCategoryFilter="";expenseStatusFilter="all";expenseSort="date-desc";expenseDateFrom="";expenseDateTo="";renderExpenses()}
function filteredExpenses(){const q=normalizeSearch(expenseSearchText);let rows=[...data.expenses].filter(x=>{const c=data.categories.find(v=>v.id===x.categoryId);const ps=paymentStatus(x);const search=[c?.name,x.title,x.company,x.note,ps.label,x.amount].map(normalizeSearch).join(" ");return(!q||search.includes(q))&&(!expenseCategoryFilter||x.categoryId===expenseCategoryFilter)&&(expenseStatusFilter==="all"||(expenseStatusFilter==="paid"&&paymentStatus(x).key==="paid")||(expenseStatusFilter==="partial"&&paymentStatus(x).key==="partial")||(expenseStatusFilter==="open"&&paymentStatus(x).key==="open")||(expenseStatusFilter==="unassigned"&&paymentStatus(x).key==="unassigned"))&&(!expenseDateFrom||x.date>=expenseDateFrom)&&(!expenseDateTo||x.date<=expenseDateTo)});rows.sort((a,b)=>expenseSort==="date-asc"?a.date.localeCompare(b.date):expenseSort==="amount-desc"?Number(b.amount)-Number(a.amount):expenseSort==="amount-asc"?Number(a.amount)-Number(b.amount):expenseSort==="title"?a.title.localeCompare(b.title,"de"):b.date.localeCompare(a.date));return rows}
function renderExpenses(){expenses.innerHTML=`<div class="section-title"><h2>Buchungen</h2>${helpButton("filters")}</div><div class="search-wrap"><div class="search-box"><input class="search-input" id="expenseSearch" type="search" placeholder="Posten, Firma oder Buchung suchen" value="${esc(expenseSearchText)}" oninput="updateExpenseSearch(this.value)"></div><div class="filters"><select id="filterCategory" onchange="updateExpenseFilter()"><option value="">Alle Posten</option>${data.categories.map(c=>`<option value="${c.id}" ${expenseCategoryFilter===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select><select id="filterStatus" onchange="updateExpenseFilter()"><option value="all">Alle Status</option><option value="paid" ${expenseStatusFilter==='paid'?'selected':''}>Bezahlt</option><option value="partial" ${expenseStatusFilter==='partial'?'selected':''}>Teilweise bezahlt</option><option value="open" ${expenseStatusFilter==='open'?'selected':''}>Offen</option><option value="unassigned" ${expenseStatusFilter==='unassigned'?'selected':''}>Quelle noch offen</option></select><input id="filterFrom" type="date" value="${expenseDateFrom}" onchange="updateExpenseFilter()"><input id="filterTo" type="date" value="${expenseDateTo}" onchange="updateExpenseFilter()"><select class="wide" id="filterSort" onchange="updateExpenseFilter()"><option value="date-desc">Neueste zuerst</option><option value="date-asc" ${expenseSort==='date-asc'?'selected':''}>Älteste zuerst</option><option value="amount-desc" ${expenseSort==='amount-desc'?'selected':''}>Höchster Betrag zuerst</option><option value="amount-asc" ${expenseSort==='amount-asc'?'selected':''}>Niedrigster Betrag zuerst</option><option value="title" ${expenseSort==='title'?'selected':''}>Alphabetisch</option></select></div></div><div class="actions"><button onclick="openExpense()">Ausgabe hinzufügen</button><button class="secondary" onclick="clearExpenseFilters()">Filter löschen</button></div><div id="expenseResults"></div>`;renderExpenseResults()}
function renderExpenseResults(){
  const t=document.getElementById("expenseResults");if(!t)return;
  const m=filteredExpenses(),sum=m.reduce((s,x)=>s+Number(x.amount),0),open=m.reduce((s,x)=>s+openAmount(x),0);
  t.innerHTML=`<div class="category-summary"><div><strong>${m.length} Buchung${m.length===1?"":"en"}</strong><div class="muted">Offen ${euro(open)}</div></div><strong>${euro(sum)}</strong></div>
  <div class="card">${m.length?m.map(x=>{const ps=paymentStatus(x);return `<div class="row" onclick="openExpense('${x.id}')"><div class="grow"><strong>${esc(x.title)}</strong>
    <div class="muted">${esc(data.categories.find(c=>c.id===x.categoryId)?.name||"Unbekannt")} · ${new Date(x.date+"T12:00:00").toLocaleDateString("de-DE")}</div>
    ${x.company?`<div class="muted">${esc(x.company)}</div>`:""}
    <span class="pill status-${ps.key}">${ps.label}</span>
    ${(Number(x.equityPaid)||0)>0||(Number(x.loanPaid)||0)>0?`<div class="muted" style="margin-top:5px">EK ${euro(x.equityPaid)} · Darlehen ${euro(x.loanPaid)}</div>`:""}
    </div><div class="amount">${euro(x.amount)}</div></div>`}).join(""):`<div class="empty">Keine passenden Buchungen gefunden.</div>`}</div>`;
}

const DOC_DB="hausbudget_documents_v1", DOC_STORE="documents";
function openDocDB(){return new Promise((resolve,reject)=>{
  const r=indexedDB.open(DOC_DB,2);
  r.onupgradeneeded=()=>{
    if(!r.result.objectStoreNames.contains(DOC_STORE))r.result.createObjectStore(DOC_STORE,{keyPath:"id"});
    if(!r.result.objectStoreNames.contains(BACKUP_STORE))r.result.createObjectStore(BACKUP_STORE,{keyPath:"id"});
  };
  r.onsuccess=()=>resolve(r.result);
  r.onerror=()=>reject(r.error);
})}
async function getDocs(){const db=await openDocDB();return new Promise((resolve,reject)=>{const r=db.transaction(DOC_STORE,"readonly").objectStore(DOC_STORE).getAll();r.onsuccess=()=>resolve(r.result.sort((a,b)=>b.createdAt.localeCompare(a.createdAt)));r.onerror=()=>reject(r.error)})}
async function putDoc(file,category){const db=await openDocDB();return new Promise((resolve,reject)=>{const tx=db.transaction(DOC_STORE,"readwrite");tx.objectStore(DOC_STORE).put({id:crypto.randomUUID(),name:file.name,type:file.type,size:file.size,category,createdAt:new Date().toISOString(),blob:file});tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)})}
async function renderDocuments(){
  documents.innerHTML=`<div class="card"><div class="section-title"><strong>Dokumente</strong>${helpButton("documents")}</div><div class="muted" style="margin-top:6px">PDFs und Fotos werden lokal auf diesem Gerät gespeichert.</div>
  <label>Kategorie</label><select id="docCategory"><option>Verträge</option><option>Rechnungen</option><option>Grundrisse</option><option>Gutachten</option><option>Fotos</option><option>Sonstiges</option></select>
  <label>Datei auswählen</label><input id="docFile" type="file" accept=".pdf,image/*,.doc,.docx,.xls,.xlsx"><div class="actions"><button onclick="uploadDocument()">Dokument speichern</button></div></div>
  <div class="card" id="documentList"><div class="empty">Dokumente werden geladen …</div></div>`;
  try{const ds=await getDocs();documentList.innerHTML=ds.length?ds.map(d=>`<div class="row"><div class="grow"><strong>${esc(d.name)}</strong><div class="doc-meta">${esc(d.category)} · ${(d.size/1024/1024).toFixed(2)} MB · ${new Date(d.createdAt).toLocaleDateString("de-DE")}</div><div class="actions"><button class="secondary" onclick="openDocument('${d.id}')">Öffnen</button><button class="danger" onclick="removeDocument('${d.id}')">Löschen</button></div></div></div>`).join(""):`<div class="empty">Noch keine Dokumente gespeichert.</div>`}catch(e){documentList.innerHTML=`<div class="over">Dokumentenspeicher konnte nicht geöffnet werden.</div>`}
}
async function uploadDocument(){const f=docFile.files[0];if(!f)return alert("Bitte zuerst eine Datei auswählen.");try{await putDoc(f,docCategory.value);docFile.value="";await renderDocuments()}catch(e){alert("Datei konnte nicht gespeichert werden.")}}
async function openDocument(id){const d=(await getDocs()).find(x=>x.id===id);if(!d)return;const u=URL.createObjectURL(d.blob);window.open(u,"_blank");setTimeout(()=>URL.revokeObjectURL(u),60000)}
async function removeDocument(id){if(!confirm("Dokument wirklich löschen?"))return;const db=await openDocDB();await new Promise((resolve,reject)=>{const tx=db.transaction(DOC_STORE,"readwrite");tx.objectStore(DOC_STORE).delete(id);tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)});await renderDocuments()}

function switchTab(id){
  document.querySelectorAll("main section").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===id));
}
document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));

function saveCategory(id){
  const obj={id:id||crypto.randomUUID(),name:cName.value.trim(),planned:Number(cPlanned.value),status:cStatus.value,note:cNote.value};
  if(!obj.name)return alert("Bitte Bezeichnung eingeben.");

  if(i>=0)data.categories[i]=obj; else data.categories.push(obj);

function updatePaymentPreview(){
  if(!document.getElementById("paymentPreview"))return;
  const amount=Math.max(0,Number(eAmount.value)||0);
  const eq=Math.max(0,Number(eEquityPaid.value)||0);
  const loan=Math.max(0,Number(eLoanPaid.value)||0);
  const paid=eq+loan, open=Math.max(0,amount-paid);
  const key=paid<=0?"Offen":paid<amount?"Teilweise bezahlt":"Vollständig bezahlt";
  paymentPreview.innerHTML=`<strong>${key}</strong><br>Bezahlt ${euro(paid)} · Rest ${euro(open)}`;
}

function saveExpense(id){
  const amount=Number(eAmount.value), equityPaid=Math.max(0,Number(eEquityPaid.value)||0), loanPaid=Math.max(0,Number(eLoanPaid.value)||0);
  const existing=data.expenses.find(x=>x.id===id);
  if(!eTitle.value.trim()||amount<=0)return alert("Bitte Bezeichnung und gültigen Rechnungsbetrag eingeben.");
  if(equityPaid+loanPaid>amount+0.005)return alert("Eigenkapital und Darlehen dürfen zusammen nicht höher als der Rechnungsbetrag sein.");

  const otherEquity=totalEquityUsed()-(existing?Number(existing.equityPaid)||0:0);
  const otherLoan=totalLoanUsed()-(existing?Number(existing.loanPaid)||0:0);
  if(otherEquity+equityPaid>Number(data.equityTotal)+0.005)return alert(`Das verfügbare Eigenkapital wird überschritten. Noch zuordenbar: ${euro(Math.max(0,data.equityTotal-otherEquity))}.`);
  if(otherLoan+loanPaid>Number(data.loanTotal)+0.005)return alert(`Das verfügbare Darlehen wird überschritten. Noch zuordenbar: ${euro(Math.max(0,data.loanTotal-otherLoan))}.`);

  const fullyAllocated=equityPaid+loanPaid>=amount-0.005;
  const obj={
    id:id||crypto.randomUUID(),categoryId:eCat.value,title:eTitle.value.trim(),amount,date:eDate.value,company:eCompany.value,
    equityPaid,loanPaid,paid:fullyAllocated,note:eNote.value
  };
  const i=data.expenses.findIndex(x=>x.id===id);
  if(i>=0)data.expenses[i]=obj;else data.expenses.push(obj);
  closeModal();persist();
}
function deleteExpense(id){
  if(confirm("Ausgabe löschen?")){
    data.expenses=data.expenses.filter(x=>x.id!==id);
    closeModal();persist();
  }
}

function saveSettings(){
  data.projectName=sName.value.trim()||"HausBudget";
  data.totalBudget=Number(sBudget.value);
  data.reserveTarget=Number(sReserve.value);data.equityTotal=Math.max(0,Number(sEquity.value)||0);data.loanTotal=Math.max(0,Number(sLoan.value)||0);data.buildProgress=Math.min(100,Math.max(0,Number(sProgress.value)||0));persist();
}
function resetData(){if(confirm("Alle Daten durch Beispieldaten ersetzen?")){data=sampleData();persist()}}



function b64u(bytes){return btoa(String.fromCharCode(...new Uint8Array(bytes))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"" )}
function verifier(){const b=new Uint8Array(64);crypto.getRandomValues(b);return b64u(b)}
async function sha(v){return crypto.subtle.digest("SHA-256",new TextEncoder().encode(v))}
function dbTokens(){try{return JSON.parse(localStorage.getItem(DROPBOX_TOKEN_KEY)||"null")}catch{return null}}
function saveDbTokens(t){localStorage.setItem(DROPBOX_TOKEN_KEY,JSON.stringify(t))}
function syncState(type,text){const e=document.getElementById("dropboxSyncState");if(e)e.innerHTML=`<span class="sync-dot ${type||""}"></span><span>${esc(text)}</span>`}
async function connectDropbox(){const v=verifier(),c=b64u(await sha(v)),s=verifier().slice(0,32);sessionStorage.setItem("db_v",v);sessionStorage.setItem("db_s",s);const q=new URLSearchParams({client_id:DROPBOX_APP_KEY,response_type:"code",redirect_uri:DROPBOX_REDIRECT_URI,code_challenge:c,code_challenge_method:"S256",token_access_type:"offline",state:s});location.href=`https://www.dropbox.com/oauth2/authorize?${q}`}
async function handleDropboxOAuthReturn(){const q=new URLSearchParams(location.search),code=q.get("code");if(!code)return;if(q.get("state")!==sessionStorage.getItem("db_s"))return alert("Dropbox-Anmeldung ungültig.");const body=new URLSearchParams({code,grant_type:"authorization_code",client_id:DROPBOX_APP_KEY,redirect_uri:DROPBOX_REDIRECT_URI,code_verifier:sessionStorage.getItem("db_v")});const r=await fetch("https://api.dropboxapi.com/oauth2/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});const x=await r.json();if(!r.ok)return alert("Dropbox-Verbindung fehlgeschlagen.");saveDbTokens({access_token:x.access_token,refresh_token:x.refresh_token,expires_at:Date.now()+x.expires_in*1000-60000});history.replaceState({},document.title,DROPBOX_REDIRECT_URI);render();if(confirm("Lokale Daten jetzt nach Dropbox übertragen?"))syncToDropbox(true)}
async function dbToken(){let t=dbTokens();if(!t)return null;if(Date.now()<t.expires_at)return t.access_token;const body=new URLSearchParams({grant_type:"refresh_token",refresh_token:t.refresh_token,client_id:DROPBOX_APP_KEY});const r=await fetch("https://api.dropboxapi.com/oauth2/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});const x=await r.json();if(!r.ok)throw Error("Dropbox-Verbindung abgelaufen");t={...t,access_token:x.access_token,expires_at:Date.now()+x.expires_in*1000-60000};saveDbTokens(t);return t.access_token}
async function dbApi(path,body){const token=await dbToken();if(!token)throw Error("Dropbox ist nicht verbunden");const r=await fetch(`https://api.dropboxapi.com/2/${path}`,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(body||{})});const x=await r.json().catch(()=>({}));if(!r.ok)throw Object.assign(Error(x.error_summary||"Dropbox-Fehler"),{status:r.status});return x}
async function renderDropboxStatus(){const box=document.getElementById("dropboxAccount"),btn=document.getElementById("dropboxConnectButton");if(!box)return;if(!dbTokens()){box.innerHTML='<div class="muted">Noch nicht mit Dropbox verbunden.</div>';if(btn)btn.style.display="";syncState("","Nicht verbunden");return}try{const a=await dbApi("users/get_current_account",{});box.innerHTML=`<div class="account-line"><div><strong>${esc(a.name?.display_name||"Dropbox")}</strong><div class="muted">${esc(a.email||"")}</div></div><span class="pill status-paid">Verbunden</span></div>`;if(btn)btn.style.display="none";syncState("connected",data.lastDropboxSyncAt?`Synchronisiert ${new Date(data.lastDropboxSyncAt).toLocaleString("de-DE")}`:"Verbunden, noch nicht synchronisiert")}catch{syncState("error","Verbindung erneuern")}}
function scheduleDropboxSync(){if(!dbTokens())return;clearTimeout(dropboxSyncTimer);dropboxSyncTimer=setTimeout(()=>syncToDropbox(false),1500)}
async function uploadDb(force=false){const token=await dbToken(),rev=force?null:localStorage.getItem(DROPBOX_REV_KEY);const mode=rev?{'.tag':'update',update:rev}:{'.tag':'overwrite'};const payload={format:"HausBudget-Dropbox",schemaVersion:1,appVersion:APP_VERSION,updatedAt:new Date().toISOString(),appData:data};const r=await fetch("https://content.dropboxapi.com/2/files/upload",{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/octet-stream","Dropbox-API-Arg":JSON.stringify({path:DROPBOX_SYNC_FILE,mode,autorename:false,mute:true,strict_conflict:true})},body:JSON.stringify(payload)});const x=await r.json().catch(()=>({}));if(!r.ok)throw Object.assign(Error(x.error_summary||"Upload fehlgeschlagen"),{status:r.status});localStorage.setItem(DROPBOX_REV_KEY,x.rev||"");data.lastDropboxSyncAt=new Date().toISOString();localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
async function syncToDropbox(show=false){if(dropboxSyncInProgress)return;if(!dbTokens())return show&&alert("Bitte zuerst Dropbox verbinden.");dropboxSyncInProgress=true;syncState("syncing","Synchronisierung läuft …");try{await uploadDb(false);syncState("connected","Mit Dropbox synchronisiert");if(show)alert("Synchronisierung erfolgreich.")}catch(e){if(e.status===409){syncState("error","Konflikt erkannt");const b=document.getElementById("dropboxConflict");if(b)b.innerHTML='<div class="conflict-box"><strong>Konflikt</strong><br>Dropbox enthält einen neueren Stand.<div class="actions"><button class="secondary" onclick="loadFromDropbox()">Dropbox laden</button><button onclick="forceDropboxUpload()">Lokal überschreiben</button></div></div>'}else{syncState("error","Synchronisierung fehlgeschlagen");if(show)alert(e.message)}}finally{dropboxSyncInProgress=false}}
async function forceDropboxUpload(){if(!confirm("Dropbox-Stand überschreiben?"))return;localStorage.removeItem(DROPBOX_REV_KEY);await uploadDb(true);render();alert("Lokaler Stand wurde hochgeladen.")}
async function loadFromDropbox(){if(!dbTokens())return alert("Bitte zuerst Dropbox verbinden.");try{const token=await dbToken();const r=await fetch("https://content.dropboxapi.com/2/files/download",{method:"POST",headers:{Authorization:`Bearer ${token}`,"Dropbox-API-Arg":JSON.stringify({path:DROPBOX_SYNC_FILE})}});if(!r.ok)throw Error("Keine Dropbox-Daten gefunden");const meta=JSON.parse(r.headers.get("dropbox-api-result")||"{}");const x=await r.json();if(!x.appData)throw Error("Ungültige Datei");if(!confirm("Dropbox-Stand laden und lokale Daten ersetzen?"))return;await createInternalRecoveryPoint("Vor Laden aus Dropbox",true);data=x.appData;localStorage.setItem(STORAGE_KEY,JSON.stringify(data));localStorage.setItem(DROPBOX_REV_KEY,meta.rev||"");render();alert("Dropbox-Daten geladen.")}catch(e){alert(e.message)}}
function disconnectDropbox(){if(!confirm("Dropbox-Verbindung trennen?"))return;localStorage.removeItem(DROPBOX_TOKEN_KEY);localStorage.removeItem(DROPBOX_REV_KEY);renderDropboxStatus()}
function backupAgeDays(){
  if(!data.lastExternalBackupAt)return null;
  const ageMs=Date.now()-new Date(data.lastExternalBackupAt).getTime();
  return Math.floor(ageMs/86400000);
}

async function renderBackupStatus(){
  const reminder=document.getElementById("backupReminder");
  if(reminder){
    const age=backupAgeDays();
    if(age===null){
      reminder.innerHTML=`<div class="backup-alert warn"><strong>⚠ Noch kein externes Backup</strong>Erstelle jetzt ein Backup und speichere es in iCloud Drive oder Google Drive.</div>`;
    }else if(age>=BACKUP_REMINDER_DAYS){
      reminder.innerHTML=`<div class="backup-alert warn"><strong>⚠ Letztes Backup vor ${age} Tagen</strong>Dein lokaler Datenstand ist gespeichert, aber ein neues externes Backup wird empfohlen.</div>`;
    }else{
      reminder.innerHTML=`<div class="backup-alert good"><strong>✓ Backup aktuell</strong>Letztes externes Backup vor ${age===0?"weniger als einem Tag":age+" Tag"+(age===1?"":"en")}.</div>`;
    }
  }

  const target=document.getElementById("recoveryPoints");
  if(target){
    try{
      const points=await listInternalRecoveryPoints();
      target.innerHTML=points.length
        ? `<div class="label-with-help" style="margin-top:12px"><div class="muted">Interne Wiederherstellungspunkte</div>${helpButton("internalRecovery")}</div>`+
          points.slice(0,5).map(p=>`<div class="recovery-item">
            <div><strong>${esc(p.reason)}</strong><div class="muted">${new Date(p.createdAt).toLocaleString("de-DE")} · Version ${esc(p.appVersion||"?")}</div></div>
            <button class="secondary small-button" onclick="restoreInternalRecoveryPoint('${p.id}')">Einspielen</button>
          </div>`).join("")
        : `<div class="muted" style="margin-top:12px">Noch kein interner Wiederherstellungspunkt vorhanden.</div>`;
    }catch(e){
      target.innerHTML=`<div class="muted" style="margin-top:12px">Wiederherstellungspunkte konnten nicht geladen werden.</div>`;
    }
  }
}

async function listInternalRecoveryPoints(){
  const db=await openDocDB();
  return new Promise((resolve,reject)=>{
    const r=db.transaction(BACKUP_STORE,"readonly").objectStore(BACKUP_STORE).getAll();
    r.onsuccess=()=>resolve(r.result.sort((a,b)=>b.createdAt.localeCompare(a.createdAt)));
    r.onerror=()=>reject(r.error);
  });
}

async function createInternalRecoveryPoint(reason="Automatisch erstellt", silent=false){
  try{
    const docs=typeof getDocs==="function"?await getDocs():[];
    const point={
      id:crypto.randomUUID(),
      createdAt:new Date().toISOString(),
      reason,
      appVersion:localStorage.getItem(VERSION_KEY)||APP_VERSION,
      appData:JSON.parse(JSON.stringify(data)),
      documents:docs
    };
    const db=await openDocDB();
    await new Promise((resolve,reject)=>{
      const tx=db.transaction(BACKUP_STORE,"readwrite");
      tx.objectStore(BACKUP_STORE).put(point);
      tx.oncomplete=resolve;
      tx.onerror=()=>reject(tx.error);
    });

    // Keep only the 5 most recent points.
    const all=await listInternalRecoveryPoints();
    if(all.length>5){
      const db2=await openDocDB();
      await new Promise((resolve,reject)=>{
        const tx=db2.transaction(BACKUP_STORE,"readwrite");
        const store=tx.objectStore(BACKUP_STORE);
        all.slice(5).forEach(x=>store.delete(x.id));
        tx.oncomplete=resolve;
        tx.onerror=()=>reject(tx.error);
      });
    }

    if(!silent){
      alert("Interner Wiederherstellungspunkt wurde erstellt.");
      renderBackupStatus();
  renderDropboxStatus();
    }
    return true;
  }catch(error){
    console.error(error);
    if(!silent)alert("Der interne Wiederherstellungspunkt konnte nicht erstellt werden.");
    return false;
  }
}

async function restoreInternalRecoveryPoint(id){
  try{
    const db=await openDocDB();
    const point=await new Promise((resolve,reject)=>{
      const r=db.transaction(BACKUP_STORE,"readonly").objectStore(BACKUP_STORE).get(id);
      r.onsuccess=()=>resolve(r.result);
      r.onerror=()=>reject(r.error);
    });
    if(!point)throw new Error("Recovery point not found");
    if(!confirm(`Wiederherstellungspunkt vom ${new Date(point.createdAt).toLocaleString("de-DE")} einspielen? Die aktuellen lokalen Daten werden ersetzt.`))return;

    data=point.appData;
    data.lastSavedAt=new Date().toISOString();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));

    const db2=await openDocDB();
    await new Promise((resolve,reject)=>{
      const tx=db2.transaction(DOC_STORE,"readwrite");
      const store=tx.objectStore(DOC_STORE);
      store.clear();
      (point.documents||[]).forEach(doc=>store.put(doc));
      tx.oncomplete=resolve;
      tx.onerror=()=>reject(tx.error);
    });

    render();
    alert("Wiederherstellungspunkt wurde erfolgreich eingespielt.");
  }catch(error){
    console.error(error);
    alert("Der Wiederherstellungspunkt konnte nicht eingespielt werden.");
  }
}

async function initializeApp(){
  await handleDropboxOAuthReturn();
  const previousVersion=localStorage.getItem(VERSION_KEY);
  if(previousVersion&&previousVersion!==APP_VERSION){
    await createInternalRecoveryPoint(`Automatisch vor Update von ${previousVersion} auf ${APP_VERSION}`, true);
  }
  localStorage.setItem(VERSION_KEY,APP_VERSION);
  render();
}

function blobToDataURL(blob){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=()=>reject(reader.error);
    reader.readAsDataURL(blob);
  });
}

function dataURLToBlob(dataURL){
  const parts=dataURL.split(",");
  const mime=(parts[0].match(/:(.*?);/)||[])[1]||"application/octet-stream";
  const binary=atob(parts[1]||"");
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  return new Blob([bytes],{type:mime});
}

async function createFullBackup(){
  try{
    const docs=typeof getDocs==="function"?await getDocs():[];
    const exportedDocs=[];
    for(const doc of docs){
      exportedDocs.push({
        id:doc.id,
        name:doc.name,
        type:doc.type,
        size:doc.size,
        category:doc.category,
        createdAt:doc.createdAt,
        dataURL:await blobToDataURL(doc.blob)
      });
    }

    const backup={
      format:"HausBudget-Backup",
      version:1,
      createdAt:new Date().toISOString(),
      appData:data,
      documents:exportedDocs
    };

    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const date=new Date().toISOString().slice(0,10);
    a.href=url;
    a.download=`HausBudget_Backup_${date}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),30000);
    data.lastExternalBackupAt=new Date().toISOString();
    data.lastSavedAt=new Date().toISOString();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    render();
    alert(`Backup erstellt: ${data.categories.length} Posten, ${data.expenses.length} Buchungen und ${exportedDocs.length} Dokumente.`);
  }catch(error){
    console.error(error);
    alert("Das Backup konnte nicht erstellt werden. Bitte erneut versuchen.");
  }
}

async function importFullBackup(file){
  if(!file)return;
  try{
    const text=await file.text();
    const backup=JSON.parse(text);

    if(backup.format!=="HausBudget-Backup"||!backup.appData||!Array.isArray(backup.appData.categories)||!Array.isArray(backup.appData.expenses)){
      throw new Error("Ungültiges Backup-Format");
    }

    const created=backup.createdAt?new Date(backup.createdAt).toLocaleString("de-DE"):"unbekannt";
    const confirmed=confirm(
      `Backup vom ${created} einspielen?\n\n`+
      `${backup.appData.categories.length} Posten\n`+
      `${backup.appData.expenses.length} Buchungen\n`+
      `${Array.isArray(backup.documents)?backup.documents.length:0} Dokumente\n\n`+
      `Die derzeitigen lokalen Daten werden vollständig ersetzt.`
    );
    if(!confirmed)return;

    data=backup.appData;
    data.lastSavedAt=new Date().toISOString();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));

    if(Array.isArray(backup.documents)&&typeof openDocDB==="function"){
      const db=await openDocDB();
      await new Promise((resolve,reject)=>{
        const tx=db.transaction(DOC_STORE,"readwrite");
        const store=tx.objectStore(DOC_STORE);
        store.clear();
        for(const doc of backup.documents){
          store.put({
            id:doc.id||crypto.randomUUID(),
            name:doc.name||"Dokument",
            type:doc.type||"application/octet-stream",
            size:Number(doc.size)||0,
            category:doc.category||"Sonstiges",
            createdAt:doc.createdAt||new Date().toISOString(),
            blob:dataURLToBlob(doc.dataURL)
          });
        }
        tx.oncomplete=resolve;
        tx.onerror=()=>reject(tx.error);
      });
    }

    expenseSearchText="";
    expenseCategoryFilter="";
    expenseStatusFilter="all";
    expenseSort="date-desc";
    expenseDateFrom="";
    expenseDateTo="";
    expandedCategoryId="";
    render();
    alert("Backup wurde erfolgreich eingespielt.");
  }catch(error){
    console.error(error);
    alert("Diese Datei ist kein gültiges HausBudget-Backup oder konnte nicht gelesen werden.");
  }
}

function exportCSV(){
  let rows=[["Datum","Kategorie","Bezeichnung","Firma","Betrag","Bezahlt","Notiz"]];
  data.expenses.forEach(x=>rows.push([x.date,data.categories.find(c=>c.id===x.categoryId)?.name||"",x.title,x.company,x.amount,x.paid?"Ja":"Nein",x.note]));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(";")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="HausBudget.csv";a.click();
}
